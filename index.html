<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>阿忠 Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
  :root {
    --cream: #F5F1E4;
    --ink: #1a1a1a;
    --orange: #E8441E;
    --green: #1BB24B;
    --blue: #1F3FD4;
    --pink: #E6298A;
    --yellow: #F7C93A;
    --gray: #9ca3af;
    --gray-soft: #e5e5e5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--cream);
    color: var(--ink);
    line-height: 1.6;
    min-height: 100vh;
    font-weight: 500;
  }

  /* Hero — full-bleed orange block */
  .hero {
    background: var(--orange);
    color: #fff;
    padding: 44px 20px 56px;
    border-bottom: 3px solid var(--ink);
    position: relative;
  }
  .hero-inner {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 24px;
  }
  .hero-title {
    font-family: 'Anton', 'Noto Sans TC', sans-serif;
    font-weight: 900;
    font-size: 5em;
    line-height: 0.92;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .hero-subtitle {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 900;
    font-size: 1.05em;
    margin-top: 8px;
    opacity: 0.95;
    letter-spacing: 0.02em;
  }
  .hero-time {
    font-size: 0.78em;
    opacity: 0.75;
    margin-top: 12px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .btn-refresh {
    background: #fff;
    border: 2px solid var(--ink);
    color: var(--orange);
    padding: 10px 22px;
    border-radius: 999px;
    font-size: 0.85em;
    font-weight: 900;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    box-shadow: 3px 3px 0 var(--ink);
    transition: all 0.12s ease;
    flex-shrink: 0;
  }
  .btn-refresh:hover {
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 var(--ink);
  }
  .btn-refresh:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--ink);
  }

  /* Main */
  .main {
    max-width: 860px;
    margin: 0 auto;
    padding: 36px 20px 60px;
  }

  .projects-title {
    font-family: 'Anton', 'Noto Sans TC', sans-serif;
    font-weight: 900;
    font-size: 1.9em;
    letter-spacing: 0.04em;
    margin: 0 0 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    color: var(--ink);
  }
  .projects-title::before {
    content: '';
    width: 16px;
    height: 16px;
    background: var(--green);
    border: 2px solid var(--ink);
    border-radius: 4px;
    flex-shrink: 0;
  }
  .projects-title .zh {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 900;
    font-size: 0.55em;
    color: var(--ink);
    opacity: 0.6;
    letter-spacing: 0;
    margin-top: 4px;
  }

  .projects-grid { display: grid; grid-template-columns: 1fr; gap: 22px; }
  @media (min-width: 560px) { .projects-grid { grid-template-columns: 1fr 1fr; } }

  .proj-card {
    position: relative;
    background: #fff;
    border: 2px solid var(--ink);
    border-radius: 16px;
    padding: 22px;
    box-shadow: 4px 4px 0 var(--ink);
    transition: all 0.15s ease;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .proj-card:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--ink);
  }

  .proj-contact-tag {
    position: absolute;
    top: 16px;
    right: 16px;
    font-size: 0.7em;
    font-weight: 700;
    color: var(--blue);
    background: #fff;
    border: 2px solid var(--blue);
    padding: 3px 12px;
    border-radius: 999px;
    letter-spacing: 0.02em;
  }

  .proj-card .proj-name {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 900;
    font-size: 1.2em;
    margin-bottom: 10px;
    color: var(--ink);
    letter-spacing: -0.01em;
    padding-right: 90px;
  }

  .proj-card .proj-status {
    display: inline-block;
    font-size: 0.68em;
    font-weight: 900;
    letter-spacing: 0.06em;
    padding: 4px 14px;
    border-radius: 999px;
    margin-bottom: 16px;
    text-transform: uppercase;
    border: 2px solid var(--ink);
  }
  .proj-status.active { background: var(--green); color: #fff; }
  .proj-status.waiting { background: var(--yellow); color: var(--ink); }
  .proj-status.done { background: var(--gray-soft); color: var(--ink); }

  .proj-items { display: flex; flex-direction: column; gap: 4px; flex: 1 0 auto; }
  .proj-empty { flex: 1 0 auto; }
  .proj-item {
    display: flex; align-items: flex-start; gap: 11px; padding: 5px 0;
    font-size: 0.86em; line-height: 1.55; color: var(--ink);
  }
  .proj-item .dot {
    width: 8px; height: 8px; min-width: 8px;
    border-radius: 2px; margin-top: 8px;
    background: var(--orange);
  }
  .proj-item.done .dot { background: var(--green); }
  .proj-item.done span {
    text-decoration: line-through;
    color: var(--gray);
    opacity: 0.7;
  }
  .proj-empty { color: var(--gray); font-size: 0.85em; font-style: italic; }

  .proj-footer {
    margin: 18px -22px -22px;
    padding: 14px 22px 16px;
    border-top: 2px solid var(--ink);
    background: var(--cream);
    border-radius: 0 0 14px 14px;
  }
  .proj-footer-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.8em; line-height: 1.8;
  }
  .proj-price {
    font-family: 'Anton', 'Noto Sans TC', sans-serif;
    font-weight: 900;
    color: var(--ink);
    font-size: 1.3em;
    letter-spacing: 0.02em;
  }
  .proj-price.na {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    color: var(--gray);
    font-size: 0.95em;
  }
  .proj-invoice-bar {
    width: 100%; height: 9px;
    border-radius: 999px;
    background: #fff;
    border: 2px solid var(--ink);
    margin: 8px 0 6px;
    overflow: hidden;
  }
  .proj-invoice-fill {
    height: 100%;
    background: var(--green);
    transition: width 0.4s ease;
  }
  .proj-invoice-labels {
    display: flex; justify-content: space-between;
    font-size: 0.74em; color: var(--ink); font-weight: 700;
  }
  .proj-splits {
    margin-top: 9px; display: flex; flex-wrap: wrap; gap: 6px;
  }
  .proj-split-tag {
    font-size: 0.7em; font-weight: 700; color: var(--ink);
    background: var(--yellow);
    border: 2px solid var(--ink);
    padding: 2px 11px;
    border-radius: 999px;
  }

  .date-tag {
    display: inline-block;
    font-weight: 700;
    font-size: 0.92em;
    color: var(--blue);
    letter-spacing: 0.01em;
  }
  .date-tag.past { color: var(--gray); font-weight: 500; }
  .date-tag.today {
    color: #fff;
    background: var(--orange);
    padding: 0 7px;
    border-radius: 4px;
    font-weight: 900;
  }
  .date-tag.tomorrow {
    color: var(--ink);
    background: var(--yellow);
    padding: 0 7px;
    border-radius: 4px;
    font-weight: 900;
  }
  .annotation { color: var(--blue); opacity: 0.55; font-size: 0.92em; }

  /* Brand section — 強強滾一家 */
  .brand-section { margin-top: 48px; }
  .brand-title {
    font-family: 'Anton', 'Noto Sans TC', sans-serif;
    font-weight: 900;
    font-size: 1.9em;
    letter-spacing: 0.04em;
    margin: 0 0 10px;
    display: flex;
    align-items: center;
    gap: 14px;
    color: var(--ink);
  }
  .brand-title::before {
    content: '';
    width: 16px; height: 16px;
    background: var(--pink);
    border: 2px solid var(--ink);
    border-radius: 4px;
    flex-shrink: 0;
  }
  .brand-title .zh {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 900; font-size: 0.55em;
    color: var(--ink); opacity: 0.6;
    letter-spacing: 0; margin-top: 4px;
  }
  .brand-sub {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 900; font-size: 1.05em;
    margin: 20px 0 14px; color: var(--ink);
    display: flex; align-items: center; gap: 8px;
  }
  .brand-sub::before {
    content: ''; width: 10px; height: 10px;
    background: var(--yellow); border: 2px solid var(--ink);
    border-radius: 3px; flex-shrink: 0;
  }

  .brand-card {
    position: relative;
    background: #fff;
    border: 2px solid var(--ink);
    border-radius: 16px;
    padding: 22px;
    box-shadow: 4px 4px 0 var(--ink);
    transition: all 0.15s ease;
    overflow: hidden;
    display: flex; flex-direction: column;
    border-left: 5px solid var(--pink);
  }
  .brand-card:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--ink);
  }
  .brand-card .proj-name { padding-right: 90px; }
  .brand-type-tag {
    position: absolute; top: 16px; right: 16px;
    font-size: 0.7em; font-weight: 900;
    color: #fff; background: var(--pink);
    border: 2px solid var(--ink);
    padding: 3px 12px; border-radius: 999px;
  }

  .group-buy-box {
    background: #fff;
    border: 2px solid var(--ink);
    border-radius: 16px;
    padding: 20px 22px;
    box-shadow: 4px 4px 0 var(--ink);
  }
  .group-buy-item {
    display: flex; align-items: flex-start; gap: 11px;
    padding: 7px 0; font-size: 0.88em; line-height: 1.55;
    color: var(--ink); border-bottom: 1px solid var(--gray-soft);
  }
  .group-buy-item:last-child { border-bottom: none; }
  .group-buy-item .dot {
    width: 8px; height: 8px; min-width: 8px;
    border-radius: 2px; margin-top: 8px;
    background: var(--pink);
  }

  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--green);
    color: #fff;
    padding: 12px 22px;
    border-radius: 999px;
    font-weight: 900;
    display: none;
    z-index: 999;
    border: 2px solid var(--ink);
    box-shadow: 4px 4px 0 var(--ink);
  }
  .toast.error { background: var(--orange); }

  @media (max-width: 559px) {
    .hero { padding: 36px 20px 48px; }
    .hero-inner { flex-direction: column; align-items: flex-start; gap: 18px; }
    .hero-title { font-size: 3.4em; }
    .main { padding: 28px 20px 50px; }
    .projects-title { font-size: 1.6em; }
  }
</style>
</head>
<body>

<div id="app"><div style="text-align:center;padding:60px;color:#6b7280;">載入中...</div></div>
<div class="toast" id="toast"></div>

<script>
const OWNER = 'ArChung';
const REPO = 'vault-dashboard';
const BRANCH = 'master';

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

async function fetchPublic(path) {
  const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}?ref=${BRANCH}`, {
    headers: { 'Accept': 'application/vnd.github.v3+json' }
  });
  if (res.status === 403) {
    const reset = res.headers.get('x-ratelimit-reset');
    const wait = reset ? Math.ceil((parseInt(reset) * 1000 - Date.now()) / 60000) : '?';
    throw new Error(`API 流量限制，請約 ${wait} 分鐘後重試`);
  }
  if (!res.ok) throw new Error(`GitHub API 錯誤 (${res.status})`);
  return res.json();
}

async function loadApp() {
  const now = new Date();
  const ts = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  document.getElementById('app').innerHTML = `
    <div class="hero">
      <div class="hero-inner">
        <div>
          <div class="hero-title">DASHBOARD</div>
          <div class="hero-subtitle">阿忠的戰情看板</div>
          <div class="hero-time">讀取時間：${ts}</div>
        </div>
        <button class="btn-refresh" onclick="loadApp()">重新整理</button>
      </div>
    </div>
    <div class="main">
      <div class="projects-title">PROJECTS <span class="zh">／ 專案總覽</span></div>
      <div class="projects-grid" id="projectsGrid"><div class="proj-empty">載入中...</div></div>

      <div class="brand-section">
        <div class="brand-title">QQGFAMILY <span class="zh">／ 強強滾一家</span></div>
        <div class="brand-sub">業配 & Reels</div>
        <div class="projects-grid" id="brandGrid"><div class="proj-empty">載入中...</div></div>
        <div class="brand-sub">團購 & 公關品</div>
        <div class="group-buy-box" id="groupBuyBox"><div class="proj-empty">載入中...</div></div>
      </div>
    </div>
  `;
  loadProjects();
  loadBrand();
}

async function loadProjects() {
  try {
    const files = await fetchPublic('Projects');
    if (!Array.isArray(files)) return;

    const mdFiles = files.filter(f => f.name.endsWith('.md'));
    const cards = await Promise.all(mdFiles.map(async f => {
      const data = await fetchPublic(`Projects/${encodeURIComponent(f.name)}`);
      const content = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
      return parseProject(content);
    }));

    const grid = document.getElementById('projectsGrid');
    if (!grid) return;
    if (cards.length === 0) { grid.innerHTML = '<div class="proj-empty">（無專案）</div>'; return; }
    grid.innerHTML = cards.map(renderProjectCard).join('');
  } catch (e) {
    const grid = document.getElementById('projectsGrid');
    if (grid) grid.innerHTML = `<div class="proj-empty">${escapeHtml(e.message)}<br><button class="btn-refresh" style="margin-top:12px;" onclick="loadApp()">重新整理</button></div>`;
  }
}

function parseProject(md) {
  const lines = md.split('\n');
  const name = (lines.find(l => l.startsWith('# ')) || '# 未命名').replace('# ', '');
  const statusLine = lines.find(l => l.startsWith('> 狀態：')) || '';
  const status = statusLine.replace('> 狀態：', '').trim();
  const contactLine = lines.find(l => l.startsWith('> 窗口：')) || '';
  const contact = contactLine.replace('> 窗口：', '').trim();

  const quoteLine = lines.find(l => l.startsWith('> 報價：')) || '';
  const quoteRaw = quoteLine.replace('> 報價：', '').trim();

  const invoicedLine = lines.find(l => l.startsWith('> 已開發票：')) || '';
  const invoicedRaw = invoicedLine.replace('> 已開發票：', '').trim();

  const splitLine = lines.find(l => l.startsWith('> 分潤：')) || '';
  const splitRaw = splitLine.replace('> 分潤：', '').trim();

  // Parse numbers from strings like "649,000 未稅（...）"
  const parseAmount = s => { const m = s.replace(/,/g,'').match(/(\d+)/); return m ? parseInt(m[1]) : 0; };
  const quoteAmount = parseAmount(quoteRaw);
  const invoicedAmount = parseAmount(invoicedRaw);

  // Parse split tags: "老甘 186,000（設計）、阿吉 待確認（前端）"
  const splits = splitRaw ? splitRaw.split('、').map(s => s.trim()).filter(Boolean) : [];

  let inTodo = false;
  const todos = [];
  for (const line of lines) {
    if (line.startsWith('## 待辦')) { inTodo = true; continue; }
    if (inTodo && line.startsWith('## ')) break;
    if (inTodo) {
      const m = line.match(/^- \[([ x])\] (.+)/);
      if (m) todos.push({ checked: m[1] === 'x', text: m[2] });
    }
  }

  const last4 = todos.slice(-4);
  return { name, status, contact, items: last4, quoteRaw, quoteAmount, invoicedAmount, splits };
}

function renderProjectCard(proj) {
  let statusClass = 'active';
  if (proj.status.includes('等待')) statusClass = 'waiting';
  if (proj.status.includes('完成')) statusClass = 'done';

  let itemsHtml = '';
  if (proj.items.length === 0) {
    itemsHtml = '<div class="proj-empty">（無待辦項目）</div>';
  } else {
    itemsHtml = '<div class="proj-items">' + proj.items.map(item =>
      `<div class="proj-item ${item.checked ? 'done' : ''}">
        <div class="dot"></div>
        <span>${formatDates(escapeHtml(item.text))}</span>
      </div>`
    ).join('') + '</div>';
  }

  // Footer: pricing + invoice + splits
  let footerHtml = '';
  const q = proj.quoteRaw;
  if (q && q !== '未報價' && q !== '未成案') {
    const fmt = n => n.toLocaleString('zh-TW');
    const pct = proj.quoteAmount > 0 ? Math.round((proj.invoicedAmount / proj.quoteAmount) * 100) : 0;
    footerHtml = `<div class="proj-footer">
      <div class="proj-footer-row">
        <span class="proj-price">${fmt(proj.quoteAmount)} 未稅</span>
        ${proj.invoicedAmount > 0 ? `<span class="proj-invoice-labels">已開 ${fmt(proj.invoicedAmount)}</span>` : ''}
      </div>
      ${proj.invoicedAmount > 0 ? `<div class="proj-invoice-bar"><div class="proj-invoice-fill" style="width:${pct}%"></div></div>
      <div class="proj-invoice-labels"><span>已收 ${pct}%</span><span>尾款 ${fmt(proj.quoteAmount - proj.invoicedAmount)}</span></div>` : ''}
      ${proj.splits.length > 0 ? `<div class="proj-splits">${proj.splits.map(s => `<span class="proj-split-tag">${escapeHtml(s)}</span>`).join('')}</div>` : ''}
    </div>`;
  } else if (q) {
    footerHtml = `<div class="proj-footer"><span class="proj-price na">${escapeHtml(q)}</span></div>`;
  }

  return `<div class="proj-card">
    <div class="proj-name">${escapeHtml(proj.name)}</div>
    <div class="proj-status ${statusClass}">${escapeHtml(proj.status || '進行中')}</div>
    ${proj.contact ? `<div class="proj-contact-tag">${escapeHtml(proj.contact)}</div>` : ''}
    ${itemsHtml}
    ${footerHtml}
  </div>`;
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function formatDates(text) {
  const weekdays = ['日','一','二','三','四','五','六'];
  const today = new Date(); today.setHours(0,0,0,0);
  // 1) Replace dates with styled spans
  let result = text.replace(/(\d{4})-(\d{2})-(\d{2})/g, (match, y, m, d) => {
    const target = new Date(+y, +m - 1, +d); target.setHours(0,0,0,0);
    const diff = Math.round((target - today) / 86400000);
    const wd = weekdays[target.getDay()];
    const short = `${+m}/${+d}`;
    let label, cls;
    if (diff === 0) { label = `${short}(${wd}) 今天`; cls = 'today'; }
    else if (diff === 1) { label = `${short}(${wd}) 明天`; cls = 'tomorrow'; }
    else if (diff === -1) { label = `${short}(${wd}) 昨天`; cls = 'past'; }
    else {
      const todayDay = today.getDay() || 7;
      const thisWeekStart = new Date(today); thisWeekStart.setDate(today.getDate() - todayDay + 1);
      const nextWeekEnd = new Date(thisWeekStart); nextWeekEnd.setDate(thisWeekStart.getDate() + 13);
      if (diff > 1 && diff < 7 && target < new Date(thisWeekStart.getTime() + 7*86400000)) {
        label = `${short} 本週${wd}`; cls = '';
      } else if (diff > 0 && target >= new Date(thisWeekStart.getTime() + 7*86400000) && target < nextWeekEnd) {
        label = `${short} 下週${wd}`; cls = '';
      } else if (diff < 0) {
        label = `${short}(${wd})`; cls = 'past';
      } else {
        label = `${short}(${wd})`; cls = '';
      }
    }
    return `<span class="date-tag ${cls}">${label}</span>`;
  });
  // 2) Wrap parenthetical annotations in styled spans
  result = result.replace(/（([^）]+)）/g, '<span class="annotation">（$1）</span>');
  result = result.replace(/\(([^)]+)\)/g, (match) => {
    if (match.includes('date-tag')) return match; // skip already-wrapped date tags
    return `<span class="annotation">${match}</span>`;
  });
  return result;
}
async function loadBrand() {
  const brandFiles = [
    { path: 'Brand/%E5%BC%B7%E5%BC%B7%E6%BB%BE%E4%B8%80%E5%AE%B6-%E6%A5%AD%E9%85%8D.md', type: '業配' },
    { path: 'Brand/%E5%BC%B7%E5%BC%B7%E6%BB%BE%E4%B8%80%E5%AE%B6-Reels.md', type: 'Reels' },
  ];
  try {
    const allCards = [];
    for (const f of brandFiles) {
      try {
        const data = await fetchPublic(f.path);
        const content = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
        const items = parseBrandCollab(content, f.type);
        allCards.push(...items);
      } catch(e) { /* file may not exist yet */ }
    }
    const grid = document.getElementById('brandGrid');
    if (!grid) return;
    if (allCards.length === 0) {
      grid.innerHTML = '<div class="proj-empty">（目前沒有進行中的業配或 Reels）</div>';
    } else {
      grid.innerHTML = allCards.map(renderBrandCard).join('');
    }
  } catch(e) {
    const grid = document.getElementById('brandGrid');
    if (grid) grid.innerHTML = `<div class="proj-empty">${escapeHtml(e.message)}</div>`;
  }

  // Group buy
  try {
    const data = await fetchPublic('Brand/%E5%BC%B7%E5%BC%B7%E6%BB%BE%E4%B8%80%E5%AE%B6-%E5%9C%98%E8%B3%BC.md');
    const content = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
    const items = parseGroupBuy(content);
    const box = document.getElementById('groupBuyBox');
    if (!box) return;
    if (items.length === 0) {
      box.innerHTML = '<div class="proj-empty">（目前沒有進行中的團購）</div>';
    } else {
      box.innerHTML = items.map(text =>
        `<div class="group-buy-item"><div class="dot"></div><span>${formatDates(escapeHtml(text))}</span></div>`
      ).join('');
    }
  } catch(e) {
    const box = document.getElementById('groupBuyBox');
    if (box) box.innerHTML = '<div class="proj-empty">（目前沒有進行中的團購）</div>';
  }
}

function parseBrandCollab(md, type) {
  const sections = md.split(/^## /m).slice(1);
  return sections.map(sec => {
    const lines = sec.split('\n');
    const name = lines[0].trim();
    const statusLine = lines.find(l => l.startsWith('> 狀態：')) || '';
    const status = statusLine.replace('> 狀態：', '').trim();
    const contactLine = lines.find(l => l.startsWith('> 窗口：')) || '';
    const contact = contactLine.replace('> 窗口：', '').trim();
    const feeLine = lines.find(l => l.startsWith('> 費用：')) || '';
    const fee = feeLine.replace('> 費用：', '').trim();
    const bullets = lines.filter(l => l.match(/^- /)).map(l => l.replace(/^- /, ''));
    return { name, status, contact, fee, type, bullets };
  }).filter(item => item.name);
}

function parseGroupBuy(md) {
  const lines = md.split('\n');
  let inActive = false;
  const items = [];
  for (const line of lines) {
    if (line.startsWith('## 進行中')) { inActive = true; continue; }
    if (inActive && line.startsWith('## ')) break;
    if (inActive && line.match(/^- /)) {
      items.push(line.replace(/^- /, ''));
    }
  }
  return items;
}

function renderBrandCard(item) {
  let statusClass = 'active';
  if (item.status.includes('等待')) statusClass = 'waiting';
  if (item.status.includes('完成') || item.status.includes('結束')) statusClass = 'done';

  const bulletsHtml = item.bullets.length > 0
    ? '<div class="proj-items">' + item.bullets.map(b =>
        `<div class="proj-item"><div class="dot"></div><span>${formatDates(escapeHtml(b))}</span></div>`
      ).join('') + '</div>'
    : '<div class="proj-empty">（無進度項目）</div>';

  let footerHtml = '';
  if (item.fee) {
    footerHtml = `<div class="proj-footer"><span class="proj-price">${escapeHtml(item.fee)}</span></div>`;
  }

  return `<div class="brand-card">
    <div class="proj-name">${escapeHtml(item.name)}</div>
    ${item.status ? `<div class="proj-status ${statusClass}">${escapeHtml(item.status)}</div>` : ''}
    <div class="brand-type-tag">${escapeHtml(item.type)}</div>
    ${item.contact ? `<div class="proj-contact-tag" style="top:42px">${escapeHtml(item.contact)}</div>` : ''}
    ${bulletsHtml}
    ${footerHtml}
  </div>`;
}

loadApp();
</script>
