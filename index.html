<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>阿忠 Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap');

  :root {
    /* —— Clean Studio Palette (brand guidelines) —— */
    --paper:        #faf9f5;   /* light cream base */
    --paper-deep:   #f0eee4;   /* slightly darker cream */
    --paper-card:   #ffffff;   /* pure white card surface */
    --ink:          #141413;   /* near-black */
    --ink-soft:     #3a3937;   /* soft dark */
    --ink-mute:     #b0aea5;   /* mid gray */
    --thread:       #e8e6dc;   /* hairline border */
    --thread-soft:  #efede3;

    /* —— Accents —— */
    --accent:       #d97757;   /* orange, primary accent */
    --accent-dark:  #b85a3e;
    --accent-soft:  #f0c9b5;
    --accent-tint:  #fbefe8;   /* bg tint of accent */
    --brand-blue:   #6a9bcc;
    --brand-green:  #788c5d;

    /* —— Status pills (bg + text) —— */
    --pill-active-bg:   #e4eadb;   /* pale green */
    --pill-active-text: #4a5d3a;
    --pill-waiting-bg:  #f5ead0;   /* pale sand */
    --pill-waiting-text:#8b7a3a;
    --pill-hold-bg:     #f5dbd2;   /* pale salmon */
    --pill-hold-text:   #a0432c;
    --pill-done-bg:     #ededea;   /* pale gray */
    --pill-done-text:   #7f7d76;

    /* —— Category (事件類型，月曆用) —— */
    --cat-project:    var(--ink);
    --cat-brand-promo:var(--accent);
    --cat-brand-reels:var(--brand-blue);
    --cat-brand-group:var(--brand-green);

    /* —— Shadows (barely-there) —— */
    --shadow-sm: 0 1px 2px rgba(20,20,19,0.03);
    --shadow-md: 0 8px 24px -14px rgba(20,20,19,0.12);
    --shadow-lg: 0 20px 44px -22px rgba(20,20,19,0.18);

    /* —— Radius —— */
    --r-sm: 6px;
    --r-md: 12px;
    --r-lg: 16px;
    --r-pill: 999px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    font-family: 'Poppins', 'Noto Sans TC', system-ui, -apple-system, sans-serif;
    background-color: var(--paper);
    background-image:
      linear-gradient(to right, rgba(120,118,108,0.08) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(120,118,108,0.08) 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--ink);
    line-height: 1.55;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
  }

  /* —— Hero (clean, sans-serif) —— */
  .hero {
    background: transparent;
    color: var(--ink);
    padding: 40px 32px 22px;
    position: relative;
  }
  .hero-inner {
    max-width: 1280px;
    margin: 0 auto;
    position: relative;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .hero-title {
    font-family: 'Poppins', 'Noto Sans TC', system-ui, sans-serif;
    font-weight: 700;
    font-size: 2em;
    letter-spacing: -0.01em;
    color: var(--ink);
    line-height: 1.15;
  }
  .hero-title .serif-accent {
    color: var(--accent);
    font-weight: 700;
  }
  .hero-time {
    font-family: 'Poppins', 'Noto Sans TC', sans-serif;
    font-size: 0.82em;
    color: var(--ink-mute);
    letter-spacing: 0.01em;
    font-weight: 400;
  }

  /* —— Toolbar (transparent, no divider) —— */
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 40;
    background: transparent;
  }
  .toolbar-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 14px 32px;
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    align-items: center;
  }
  .seg {
    display: inline-flex;
    gap: 2px;
    background: transparent;
    padding: 0;
  }
  .seg button {
    border: 0;
    background: transparent;
    color: var(--ink-mute);
    font-family: inherit;
    font-weight: 400;
    font-size: 0.88em;
    font-style: italic;
    padding: 4px 10px;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: color 0.18s ease;
    position: relative;
  }
  .seg button:hover { color: var(--ink-soft); }
  .seg button.on {
    color: var(--accent);
    font-style: normal;
    font-weight: 600;
  }
  .seg button.on::after {
    content: '';
    position: absolute;
    left: 10px; right: 10px; bottom: -2px;
    height: 1px;
    background: var(--accent);
  }
  .toolbar-spacer { flex: 1; }
  .sort-select {
    border: 0;
    background: transparent;
    color: var(--ink-soft);
    font-family: inherit;
    font-size: 0.88em;
    font-style: italic;
    font-weight: 400;
    padding: 4px 8px 4px 0;
    cursor: pointer;
    letter-spacing: 0.01em;
  }
  .icon-btn {
    width: 36px; height: 36px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 999px;
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--thread);
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .icon-btn:hover { color: var(--accent); border-color: var(--accent); }
  .icon-btn.ghost {
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--thread);
  }
  .icon-btn svg { width: 16px; height: 16px; }

  .chips-row {
    width: 100%;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .chip-toggle {
    border: 0;
    background: transparent;
    color: var(--ink-mute);
    font-family: inherit;
    font-weight: 400;
    font-size: 0.85em;
    font-style: italic;
    padding: 3px 10px;
    cursor: pointer;
    letter-spacing: 0.01em;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: color 0.15s ease;
  }
  .chip-toggle .dot { display: none; }
  .chip-toggle:hover { color: var(--ink-soft); }
  .chip-toggle.on {
    color: var(--accent);
    font-style: normal;
    font-weight: 600;
  }
  .chip-toggle .count {
    font-size: 0.82em;
    font-weight: 400;
    color: var(--ink-mute);
    font-style: italic;
    margin-left: 2px;
  }
  .chip-toggle.on .count { color: var(--accent); opacity: 0.7; }

  /* —— Main —— */
  .main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 32px 32px 80px;
  }
  .cards-grid { grid-template-columns: 1fr; }
  @media (min-width: 720px) { .cards-grid { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 1120px) { .cards-grid { grid-template-columns: 1fr 1fr 1fr; } }
  .group-section + .group-section { margin-top: 48px; }
  .group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 0 0 18px;
    padding-bottom: 0;
  }
  .group-header h2 {
    font-family: 'Poppins', 'Noto Sans TC', sans-serif;
    font-weight: 700;
    font-size: 1em;
    color: var(--ink);
    letter-spacing: 0;
    white-space: nowrap;
  }
  .group-header .dash {
    flex: 1;
    height: 1px;
    background: var(--ink-mute);
    opacity: 0.35;
    min-width: 20px;
    max-width: 28px;
  }
  .group-header .count {
    font-family: 'Poppins', 'Noto Sans TC', sans-serif;
    font-weight: 500;
    color: var(--ink-mute);
    font-size: 0.82em;
  }

  .cards-grid {
    display: grid;
    gap: 20px;
  }

  /* —— Card v6 (clean studio) —— */
  .card {
    position: relative;
    background: var(--paper-card);
    border: 1px solid var(--thread);
    border-radius: var(--r-md);
    padding: 22px;
    box-shadow: var(--shadow-sm);
    transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.32s ease, border-color 0.22s ease;
    display: flex;
    flex-direction: column;
    min-height: 0;
    position: relative;
    z-index: 2;
  }
  /* card-wrap is the grid cell; hover on wrap lifts face + slides drawer */
  .card-wrap {
    position: relative;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }
  .card-wrap > .card { flex: 1; }  /* main card fills wrap, 才能把底卡擋在身後 */
  .card-wrap:hover { z-index: 10; }
  .card-wrap:hover .card {
    transform: translateY(-3px);
    box-shadow: 0 18px 40px -18px rgba(20,20,19,0.22),
                0 6px 14px -6px rgba(20,20,19,0.08);
    border-color: #d9d6c8;
  }
  .card-wrap.foot-open { z-index: 10; }
  .card-wrap.foot-open .card {
    transform: translateY(-3px);
    box-shadow: 0 18px 40px -18px rgba(20,20,19,0.22),
                0 6px 14px -6px rgba(20,20,19,0.08);
    border-color: #d9d6c8;
  }
  .card.is-done { opacity: 0.6; }
  .card.flash {
    animation: flash-card 1.8s ease;
  }
  @keyframes flash-card {
    0%, 100% { box-shadow: var(--shadow-sm); }
    25%, 65% { box-shadow: 0 0 0 3px var(--accent-tint), var(--shadow-md); }
  }

  /* —— Corner status tag (top-right of card) —— */
  .card-corner-tag {
    position: absolute;
    top: 12px;
    right: 12px;
    padding: 2px 8px;
    border-radius: 999px;
    font-family: 'Poppins', 'Noto Sans TC', sans-serif;
    font-size: 0.62em;
    font-weight: 500;
    letter-spacing: 0.02em;
    line-height: 1.4;
    white-space: nowrap;
    z-index: 2;
  }
  .card-corner-tag.ct-active  { background: #eef2e6; color: #7a8d68; }   /* soft green = 進行中 */
  .card-corner-tag.ct-waiting { background: #fbf3e1; color: #b09657; }   /* soft amber = 等待中 */
  .card-corner-tag.ct-hold    { background: #fae6dd; color: #c28672; }   /* soft salmon = 考慮中 */
  .card-corner-tag.ct-done    { background: #f2f2ef; color: #a3a199; opacity: 0.9; }  /* soft gray = 已完成 */

  /* —— Card title —— */
  /* 標題下壓一條淡淡的 hairline，上下各 8px 留白 */
  .card-head {
    display: block;
    padding-bottom: 8px;
    margin-bottom: 8px;
    padding-right: 76px; /* reserve space for corner text tag */
    border-bottom: 1px solid var(--thread-soft);
  }
  .card-title {
    font-family: 'Poppins', 'Noto Sans TC', sans-serif;
    font-weight: 700;
    font-size: 1.25em;
    color: var(--ink);
    letter-spacing: -0.008em;
    line-height: 1.3;
  }
  .card.is-done .card-title { color: var(--ink-mute); }

  /* —— Card body (todos / last log, em-dash prefix) —— */
  .card-body {
    flex: 1 0 auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 18px;
  }
  .card-body-empty {
    color: var(--ink-mute);
    font-size: 0.88em;
    font-family: 'Poppins', 'Noto Sans TC', sans-serif;
  }
  .card-todo {
    font-family: 'Poppins', 'Noto Sans TC', sans-serif;
    font-size: 0.95em;
    line-height: 1.65;
    color: var(--ink-soft);
    font-weight: 400;
    display: block;
    padding-left: 0.95em;
    text-indent: -0.95em;
  }
  .card-todo::before {
    content: '– ';
    color: var(--ink-mute);
    font-weight: 400;
  }
  .card-todo.done {
    color: var(--ink-mute);
    text-decoration: line-through;
    text-decoration-color: var(--ink-mute);
  }
  .card-last-log {
    font-family: 'Poppins', 'Noto Sans TC', sans-serif;
    font-size: 0.88em;
    color: var(--ink-soft);
    line-height: 1.55;
    display: block;
    padding-left: 1.4em;
    text-indent: -1.4em;
  }
  .card-last-log::before {
    content: '— ';
    color: var(--ink-mute);
  }
  .card-last-log .label {
    font-size: 0.78em;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-right: 6px;
  }

  /* —— Card footer (v6: soft tinted bg) —— */
  .card-footer-warm {
    padding: 12px 22px;
    background: transparent; /* inherits from .card-foot-wrap */
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 4px 10px;
    border-radius: 0;
    position: relative;
    font-family: 'Poppins', 'Noto Sans TC', sans-serif;
    font-size: 0.82em;
    color: var(--ink-soft);
    font-weight: 400;
    letter-spacing: 0;
    line-height: 1.5;
  }
  .card-money {
    display: inline-flex;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 0 10px;
  }
  .card-price {
    font-family: 'Poppins', 'Noto Sans TC', sans-serif;
    font-weight: 600;
    color: var(--ink);
    font-size: 1em;
    letter-spacing: 0;
    line-height: 1.5;
    font-variant-numeric: tabular-nums;
  }
  .card-price .unit {
    font-weight: 400;
    font-size: 0.82em;
    color: var(--ink-mute);
    margin-left: 4px;
    letter-spacing: 0;
  }
  .card-price.na {
    font-weight: 400;
    color: var(--ink-mute);
    font-size: 0.95em;
  }
  .card-invoiced {
    font-size: 0.95em;
    color: var(--ink-mute);
    font-weight: 400;
    font-variant-numeric: tabular-nums;
  }
  .card-invoiced::before {
    content: '·';
    margin-right: 10px;
    color: var(--ink-mute);
    opacity: 0.55;
  }
  .card-splits-line {
    font-size: 0.9em;
    color: var(--ink-mute);
    letter-spacing: 0;
    font-weight: 400;
    line-height: 1.5;
    flex-basis: 100%;
  }
  .fee-line {
    font-family: 'Poppins', 'Noto Sans TC', sans-serif;
    font-weight: 500;
    font-size: 1em;
    color: var(--ink);
    letter-spacing: 0;
    line-height: 1.5;
  }
  .card-footer-contact {
    margin-left: auto;
    font-size: 0.9em;
    color: var(--ink-mute);
    font-weight: 400;
  }

  /* —— Card bottom meta —— */
  .card-meta-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    padding: 10px 22px;
    background: transparent; /* inherits warm tint from .card-foot-wrap */
    font-family: 'Poppins', 'Noto Sans TC', sans-serif;
    font-size: 0.76em;
    color: var(--ink-mute);
    font-weight: 400;
    letter-spacing: 0;
    min-height: 20px;
    border-top: 1px solid rgba(200, 192, 170, 0.35);
  }
  .card-meta-bottom .meta-date {
    flex: 1;
    font-variant-numeric: tabular-nums;
  }

  /* —— Cal icon row (right-bottom of main card) —— */
  .card-cal-row {
    display: flex;
    justify-content: flex-end;
    padding: 0;
    margin-top: 4px;
  }
  .card-cal-btn {
    width: 28px;
    height: 28px;
    border-radius: var(--r-sm);
    background: transparent;
    color: var(--ink-mute);
    border: 1px solid var(--thread);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.18s ease;
    flex-shrink: 0;
    padding: 0;
  }
  .card-cal-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-tint);
  }
  .card-cal-btn svg { width: 14px; height: 14px; }

  /* —— Footer: 第二張卡片 sitting under the main card ——
     rest: bottom: -10px 讓底卡的 bottom 邊緣比主卡片底部多露 10px（讓 peek 更明顯、有延續感）；
           其餘部分被主卡（z-index 2）擋住。
     hover: translateY(calc(100% - 31px)) 把底卡往下滑，
            底卡頂部比主卡（浮起 -3px 後）底部再高 18px —> 兩張卡重疊 18px，
            因此底卡 padding-top 也加 18px 補回被蓋住的內容空間。
     底卡左右各內縮 8px，比主卡窄一圈，視覺更輕。 */
  .card-foot-card {
    position: absolute;
    bottom: -10px;
    left: 8px;
    right: 8px;
    z-index: 1;
    background: #f7f3ea;
    border: 1px solid var(--thread);
    border-radius: var(--r-md);
    padding: 30px 20px 14px;
    box-shadow: var(--shadow-sm);
    font-family: 'Poppins', 'Noto Sans TC', sans-serif;
    font-size: 0.82em;
    color: var(--ink-soft);
    transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.32s ease;
    cursor: pointer;
    will-change: transform;
  }
  @media (hover: hover) {
    .card-wrap:hover .card-foot-card {
      transform: translateY(calc(100% - 31px));
      box-shadow: 0 14px 28px -14px rgba(20,20,19,0.18),
                  0 4px 10px -4px rgba(20,20,19,0.06);
    }
  }
  .card-wrap.foot-open .card-foot-card {
    transform: translateY(calc(100% - 31px));
    box-shadow: 0 14px 28px -14px rgba(20,20,19,0.18),
                0 4px 10px -4px rgba(20,20,19,0.06);
  }

  /* inner layout: reuse existing footer-warm / meta-bottom */
  .card-foot-card .card-footer-warm {
    padding: 0 0 4px;
    border: 0;
  }
  .card-foot-card .card-meta-bottom {
    padding: 4px 0 0;
    border-top: 0; /* 移除 hairline，讓底卡更輕 */
  }

  /* —— Date tags (inline) —— */
  .date-tag {
    display: inline;
    font-family: 'Poppins', 'Noto Sans TC', sans-serif;
    font-weight: 500;
    font-size: 0.98em;
    color: var(--accent);
    letter-spacing: 0;
    white-space: nowrap;
  }
  .date-tag.past { color: var(--ink-mute); font-weight: 400; }
  .date-tag.today {
    color: var(--accent-dark);
    font-weight: 600;
    border-bottom: 2px solid var(--accent);
    padding-bottom: 1px;
  }
  .date-tag.tomorrow {
    color: var(--accent);
    font-weight: 600;
  }
  .annotation { color: var(--ink-mute); font-size: 0.9em; }

  /* —— Ledger Lines (待剪想法) —— */
  .ideas-group { margin-top: 48px; }
  .ideas-list {
    display: flex;
    flex-direction: column;
    gap: 0;
    background: var(--paper-card);
    border-radius: var(--r-md);
    overflow: hidden;
    border: 1px solid var(--thread);
  }
  .ideas-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 16px 11px 14px;
    background: var(--paper-card);
    font-family: 'Poppins', 'Noto Sans TC', sans-serif;
    font-size: 0.9em;
    color: var(--ink);
    line-height: 1.45;
    min-height: 42px;
    transition: background 0.15s ease;
    position: relative;
    border-bottom: 1px solid var(--thread-soft);
  }
  .ideas-row:last-child { border-bottom: 0; }
  .ideas-row:hover { background: var(--paper); }
  .ideas-row::before {
    content: '—';
    color: var(--ink-mute);
    flex-shrink: 0;
  }
  .ideas-row.done {
    color: var(--ink-mute);
    text-decoration: line-through;
    text-decoration-color: var(--ink-mute);
  }
  .ideas-row.done::before { opacity: 0.5; }
  .ideas-row-text { flex: 1; min-width: 0; }
  .ideas-empty {
    padding: 16px 18px;
    background: var(--paper-card);
    color: var(--ink-mute);
    font-family: 'Poppins', 'Noto Sans TC', sans-serif;
    font-size: 0.88em;
  }

  /* —— Toolbar Drawer (v6: single pill → expand, sans-serif) —— */
  .toolbar-pill-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .toolbar-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 1px solid var(--thread);
    background: var(--paper-card);
    color: var(--ink-soft);
    font-family: 'Poppins', 'Noto Sans TC', sans-serif;
    font-size: 0.82em;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: var(--r-pill);
    cursor: pointer;
    letter-spacing: 0;
    transition: all 0.18s ease;
  }
  .toolbar-pill:hover { border-color: var(--ink-mute); color: var(--ink); }
  .toolbar-pill.open { border-color: var(--accent); color: var(--accent); background: var(--accent-tint); }
  .toolbar-pill .tp-chev {
    font-size: 0.72em;
    opacity: 0.6;
    transition: transform 0.2s ease;
  }
  .toolbar-pill.open .tp-chev { transform: rotate(180deg); }

  .toolbar-drawer {
    display: none;
    max-width: 1280px;
    margin: 0 auto;
    padding: 6px 32px 14px;

<div id="fileProtoBanner" style="display:none;position:sticky;top:0;z-index:500;background:#fff3d9;border-bottom:1px solid #e8d59a;padding:12px 24px;font-family:'Poppins','Noto Sans TC',sans-serif;font-size:0.88em;color:#6b5420;text-align:center;line-height:1.55;">
  <strong style="color:#8b6914;">⚠️ 你正以 <code style="background:#ffe7a8;padding:1px 6px;border-radius:3px;">file://</code> 直接打開本檔</strong> — 瀏覽器會封鎖本機檔案讀取，只能走 GitHub API（會撞流量上限）。<br>
  建議雙點 vault 根目錄的 <code style="background:#ffe7a8;padding:1px 6px;border-radius:3px;">阿忠戰情表.bat</code>，用本機伺服器開啟（避開流量限制、未 push 的改動也看得到）。
</div>
<div id="app"><div style="text-align:center;padding:80px;color:var(--ink-mute);">載入中...</div></div>
<div class="toast" id="toast"></div>
<div class="modal-backdrop" id="masterModal" onclick="if(event.target===this)closeMasterCal()"></div>

<script>
const OWNER = 'ArChung';
const REPO = 'vault-dashboard';
const BRANCH = 'master';
const MD_CACHE_KEY = 'archung-md-cache-v1';
const PREFS_KEY = 'archung-prefs-v2';

// ——— Icons ———
const I = {
  search:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>',
  calendar:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="17" rx="2.5"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4"/></svg>',
  refresh: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15.6-6.1L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15.6 6.1L3 16"/><path d="M3 21v-5h5"/></svg>',
  pause:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9 9.5v5M15 9.5v5"/></svg>',
  arrowL:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M14 6l-6 6 6 6"/></svg>',
  arrowR:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M10 6l6 6-6 6"/></svg>',
  chevronDown: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>',
};

// ——— State ———
const state = {
  projects: [],
  brand: [],
  groupBuy: [],
  prefs: loadPrefs(),
  masterMonth: null,
  masterFilter: null,
};

function loadPrefs() {
  try { return Object.assign({ groupBy:'kind', sort:'updated', statuses:['active','waiting','hold'] }, JSON.parse(localStorage.getItem(PREFS_KEY) || '{}')); }
  catch { return { groupBy:'kind', sort:'updated', statuses:['active','waiting','hold'] }; }
}
function savePrefs() { localStorage.setItem(PREFS_KEY, JSON.stringify(state.prefs)); }

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

// ——— Fetch with sessionStorage cache + 本地 fallback ———
const IS_FILE_PROTO = location.protocol === 'file:';
const IS_LOCAL_HTTP = location.hostname === 'localhost'
                   || location.hostname === '127.0.0.1';
// 只有走本機 http server 才能真的讀本地檔；file:// 瀏覽器會封鎖，沒必要試
const IS_LOCAL = IS_LOCAL_HTTP;

// 顯示 file:// 警告 banner
if (IS_FILE_PROTO) {
  document.addEventListener('DOMContentLoaded', () => {
    const b = document.getElementById('fileProtoBanner');
    if (b) b.style.display = 'block';
  });
}

// 本地 fetch：同源相對路徑抓檔案或目錄列表
async function fetchLocal(path) {
  // 目錄列表：從 python http.server 的 HTML index 解析出 .md 檔名
  if (!path.endsWith('.md')) {
    const res = await fetch(path + '/', { cache: 'no-store' });
    if (!res.ok) throw new Error(`本地目錄讀取失敗 ${path} (${res.status})`);
    const html = await res.text();
    const files = [];
    const re = /<a\s+href="([^"?#/]+\.md)"/gi;
    let m;
    while ((m = re.exec(html))) {
      files.push({ name: decodeURIComponent(m[1]) });
    }
    return files;
  }
  // 單檔：讀 text，包成 GitHub API 的形狀（base64 的 content），讓 decodeMd 通吃
  const res = await fetch(path, { cache: 'no-store' });
  if (!res.ok) throw new Error(`本地檔案讀取失敗 ${path} (${res.status})`);
  const text = await res.text();
  const base64 = btoa(unescape(encodeURIComponent(text)));
  return { content: base64 };
}

async function fetchPublic(path, useCache = true) {
  if (useCache) {
    try {
      const cache = JSON.parse(sessionStorage.getItem(MD_CACHE_KEY) || '{}');
      if (cache[path]) return cache[path];
    } catch {}
  }

  // 本地開啟：先走本地檔案系統；抓失敗再去 GitHub API
  if (IS_LOCAL) {
    try {
      const data = await fetchLocal(path);
      if (useCache) {
        try {
          const cache = JSON.parse(sessionStorage.getItem(MD_CACHE_KEY) || '{}');
          cache[path] = data;
          sessionStorage.setItem(MD_CACHE_KEY, JSON.stringify(cache));
        } catch {}
      }
      return data;
    } catch (e) {
      // 本地找不到就讓它 fall through 去試 API
    }
  }

  // GitHub API
  let res, apiErr;
  try {
    res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}?ref=${BRANCH}`, {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });
  } catch (e) { apiErr = e; }

  // API 失敗（網路錯誤 / 403 流量限制）→ 若 IS_LOCAL 其實上面已試過；若不是，再試一次本地（防使用者本機開但 hostname 誤判）
  const rateLimited = res && res.status === 403;
  if (apiErr || rateLimited) {
    if (!IS_LOCAL) {
      const fallback = await fetchLocal(path).catch(() => null);
      if (fallback) {
        if (!sessionStorage.getItem('archung-local-fallback-warned')) {
          showToast('API 流量上限，已改讀本地檔案');
          sessionStorage.setItem('archung-local-fallback-warned', '1');
        }
        if (useCache) {
          try {
            const cache = JSON.parse(sessionStorage.getItem(MD_CACHE_KEY) || '{}');
            cache[path] = fallback;
            sessionStorage.setItem(MD_CACHE_KEY, JSON.stringify(cache));
          } catch {}
        }
        return fallback;
      }
    }
    if (rateLimited) {
      const reset = res.headers.get('x-ratelimit-reset');
      const wait = reset ? Math.ceil((parseInt(reset) * 1000 - Date.now()) / 60000) : '?';
      throw new Error(`API 流量限制，請約 ${wait} 分鐘後重試`);
    }
    throw apiErr || new Error('GitHub API 連線失敗');
  }
  if (!res.ok) throw new Error(`GitHub API 錯誤 (${res.status})`);
  const data = await res.json();
  if (useCache) {
    try {
      const cache = JSON.parse(sessionStorage.getItem(MD_CACHE_KEY) || '{}');
      cache[path] = data;
      sessionStorage.setItem(MD_CACHE_KEY, JSON.stringify(cache));
    } catch {}
  }
  return data;
}

function decodeMd(data) {
  return decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
}

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ——— Date utilities ———
function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
function fmtMD(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
const WEEKDAYS = ['日','一','二','三','四','五','六'];

// ——— Date extraction ———
// Returns: [{ date, endDate?, type, source, text, time?, raw }]
// types: start | todo | done | log | note | campaign
function extractDates(md, projectName) {
  const events = [];
  const seen = new Set();
  const lines = md.split('\n');
  let section = '';
  const today = startOfDay(new Date());
  const thisYear = today.getFullYear();

  function pushEvent(dateStr, type, source, text, opts={}) {
    const k = `${dateStr}|${type}|${text.slice(0, 30)}`;
    if (seen.has(k)) return;
    seen.add(k);
    events.push({ date: new Date(dateStr), type, source, text, raw: opts.raw, time: opts.time, endDate: opts.endDate });
  }

  function tryISO(s, type, source, sourceText, opts={}) {
    const r = /\b(\d{4})-(\d{1,2})-(\d{1,2})\b/g;
    let m;
    while ((m = r.exec(s))) {
      const y = +m[1], mo = +m[2], d = +m[3];
      if (y < 2020 || y > 2035 || mo < 1 || mo > 12 || d < 1 || d > 31) continue;
      const iso = `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      // detect time range after the date
      let time = null;
      const tail = s.slice(m.index + m[0].length, m.index + m[0].length + 30);
      const tm = tail.match(/(\d{1,2}):(\d{2})\s*[~–\-至]?\s*(\d{1,2}:\d{2})?/);
      if (tm) time = tm[0].trim();
      pushEvent(iso, type, source, sourceText, { raw: m[0], time, ...opts });
    }
  }

  function tryRange(s, source, sourceText) {
    // 2026-05 中 ~ 2026-07 中  /  2026-05 ~ 2026-07
    const r = /(\d{4})-(\d{1,2})\s*(?:月)?\s*(?:中|初|底)?\s*[~～\-–至]\s*(\d{4})-(\d{1,2})/g;
    let m;
    while ((m = r.exec(s))) {
      const y1=+m[1], mo1=+m[2], y2=+m[3], mo2=+m[4];
      if (y1 < 2020 || y2 > 2035) continue;
      const start = `${y1}-${String(mo1).padStart(2,'0')}-15`;
      const end   = `${y2}-${String(mo2).padStart(2,'0')}-15`;
      pushEvent(start, 'campaign', source, sourceText, { raw: m[0], endDate: new Date(end) });
    }
  }

  function tryCN(s, type, source, sourceText) {
    const r = /(\d{4})\s*年\s*(\d{1,2})\s*月\s*(\d{1,2})\s*日?/g;
    let m;
    while ((m = r.exec(s))) {
      const y=+m[1], mo=+m[2], d=+m[3];
      if (y < 2020 || y > 2035) continue;
      const iso = `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      pushEvent(iso, type, source, sourceText, { raw: m[0] });
    }
  }

  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (!line) continue;
    if (line.startsWith('## ')) { section = line.replace(/^##+\s*/, ''); continue; }
    if (line.startsWith('### ')) { continue; }

    const isMeta = line.startsWith('> ');
    if (isMeta) {
      // Only specific meta keys yield dates
      if (line.startsWith('> 開始日期：')) {
        tryISO(line, 'start', '開始日期', '開始：' + line.replace('> 開始日期：','').trim());
      }
      // Skip other > lines (avoid 報價/已開發票/分潤誤判)
      continue;
    }

    let type = 'note';
    if (section.includes('待辦')) {
      const checked = /^- \[x\]/i.test(line);
      type = checked ? 'done' : 'todo';
    } else if (section.includes('進度')) {
      type = 'log';
    } else if (section.includes('最新') || section.includes('備註') || section === '') {
      type = 'note';
    }

    // The displayed source text for the event: strip checkbox markers
    const display = line.replace(/^- \[[ x]\]\s*/i, '').replace(/^- /, '');

    tryISO(line, type, section || '備註', display);
    tryCN(line, type, section || '備註', display);
    tryRange(line, section || '備註', display);
  }

  // Filter: drop way-out-of-range dates (extra safety)
  return events.filter(e => {
    const y = e.date.getFullYear();
    return y >= 2020 && y <= 2035 && !isNaN(e.date.getTime());
  }).sort((a,b) => a.date - b.date);
}

// ——— Markdown parsing ———
function parseProject(md) {
  const lines = md.split('\n');
  const name = (lines.find(l => l.startsWith('# ')) || '# 未命名').replace('# ', '').trim();
  const meta = (key) => {
    const l = lines.find(l => l.startsWith(`> ${key}：`));
    return l ? l.replace(`> ${key}：`, '').trim() : '';
  };
  const status = meta('狀態');
  const contact = meta('窗口');
  const client = meta('客戶');
  const quoteRaw = meta('報價');
  const invoicedRaw = meta('已開發票');
  const splitRaw = meta('分潤');
  const startDateRaw = meta('開始日期');

  const parseAmount = s => { const m = s.replace(/,/g,'').match(/(\d+)/); return m ? parseInt(m[1]) : 0; };
  const quoteAmount = parseAmount(quoteRaw);
  const invoicedAmount = parseAmount(invoicedRaw);
  const splits = splitRaw ? splitRaw.split('、').map(s => s.trim()).filter(Boolean) : [];

  // Todos & last log
  let inTodo = false, inLog = false;
  const todos = [], logs = [];
  for (const line of lines) {
    if (line.startsWith('## 待辦')) { inTodo = true; inLog = false; continue; }
    if (line.startsWith('## 進度')) { inTodo = false; inLog = true; continue; }
    if (line.startsWith('## ')) { inTodo = false; inLog = false; continue; }
    if (inTodo) {
      const m = line.match(/^- \[([ x])\] (.+)/i);
      if (m) todos.push({ checked: m[1].toLowerCase() === 'x', text: m[2] });
    }
    if (inLog) {
      const m = line.match(/^- (.+)/);
      if (m) logs.push(m[1]);
    }
  }
  const openTodos = todos.filter(t => !t.checked).slice(0, 2);
  const lastLog = logs.length > 0 ? logs[logs.length - 1] : '';
  const events = extractDates(md, name);
  // Last meaningful update = max log date or start date
  let lastUpdate = null;
  for (const e of events) { if (e.type === 'log' || e.type === 'done') lastUpdate = e.date; }

  return {
    kind: 'project',
    chip: 'PROJECT',
    chipClass: '',
    name, status, contact, client,
    quoteRaw, quoteAmount, invoicedAmount, splits,
    startDateRaw,
    openTodos, allTodos: todos, lastLog,
    events,
    lastUpdate,
  };
}

function parseBrandCollab(md, type) {
  const sections = md.split(/^## /m).slice(1);
  return sections.map(sec => {
    const lines = sec.split('\n');
    const name = lines[0].trim();
    const body = lines.slice(1).join('\n');
    const meta = (key) => {
      const l = lines.find(l => l.startsWith(`> ${key}：`));
      return l ? l.replace(`> ${key}：`, '').trim() : '';
    };
    const status = meta('狀態');
    const contact = meta('窗口');
    const fee = meta('費用');
    const bullets = lines.filter(l => l.match(/^- /)).map(l => l.replace(/^- /, ''));
    const events = extractDates('## ' + sec, name);
    return {
      kind: 'brand',
      brandType: type, // '業配' | 'Reels'
      chip: type === '業配' ? 'BRAND · 業配' : 'BRAND · REELS',
      chipClass: type === '業配' ? 'is-brand-promo' : 'is-brand-reels',
      name, status, contact, fee,
      bullets,
      openTodos: bullets.slice(0, 2).map(b => ({ checked: false, text: b })),
      lastLog: bullets.length > 0 ? bullets[bullets.length - 1] : '',
      events,
      lastUpdate: events.length ? events[events.length - 1].date : null,
    };
  }).filter(item => item.name);
}

function parseGroupBuy(md) {
  const sections = md.split(/^## /m).slice(1);
  const items = [];
  for (const sec of sections) {
    const lines = sec.split('\n');
    const sectionName = lines[0].trim(); // 進行中 / 已結束
    if (!sectionName.includes('進行中')) continue;
    for (const l of lines) {
      const m = l.match(/^- (.+)/);
      if (m) {
        const text = m[1];
        // Try parse "品牌：狀態"
        const colon = text.match(/^([^：:]+)[：:](.+)$/);
        const itemName = colon ? colon[1].trim() : text;
        const itemDesc = colon ? colon[2].trim() : '';
        items.push({
          kind: 'brand',
          brandType: '團購',
          chip: 'BRAND · 團購',
          chipClass: 'is-brand-group',
          name: itemName,
          status: '進行中',
          contact: '',
          fee: '',
          bullets: itemDesc ? [itemDesc] : [],
          openTodos: itemDesc ? [{ checked: false, text: itemDesc }] : [],
          lastLog: itemDesc,
          events: extractDates('## ' + sec, itemName).filter(e => e.text.includes(itemName) || e.text.includes(itemDesc.slice(0,8))),
          lastUpdate: null,
        });
      }
    }
  }
  return items;
}

// ——— Card rendering ———
function statusBucket(status) {
  if (!status) return 'active';
  if (status.includes('完成') || status.includes('結束')) return 'done';
  if (status.includes('考慮')) return 'hold';
  if (status.includes('等待')) return 'waiting';
  return 'active';
}

const STATUS_GLYPH = {
  active:  { ch: '●', label: '進行中' },
  waiting: { ch: '○', label: '等待中' },
  hold:    { ch: '·', label: '考慮中' },
  done:    { ch: '✓', label: '已完成' },
};

function hasTodayTodo(item) {
  const today = startOfDay(new Date());
  if (!item.events) return false;
  return item.events.some(e =>
    e.type === 'todo' &&
    startOfDay(e.date).getTime() === today.getTime()
  );
}

function renderCard(item, idx) {
  const bucket = statusBucket(item.status);
  const cardClasses = ['card'];
  if (bucket === 'waiting') cardClasses.push('is-waiting');
  if (bucket === 'done') cardClasses.push('is-done');
  if (hasTodayTodo(item)) cardClasses.push('has-today');

  // Title（無前綴符號；狀態用右上角的中文 tag 表示）
  const glyph = STATUS_GLYPH[bucket] || STATUS_GLYPH.active;
  const cornerTagHtml = `<span class="card-corner-tag ct-${bucket}" title="${escapeHtml(item.status || glyph.label)}">${escapeHtml(glyph.label)}</span>`;
  const headHtml = `<div class="card-head">
    <h3 class="card-title">${escapeHtml(item.name)}</h3>
  </div>`;

  // Body：open todos / last log / empty；不用 bullet marker
  let bodyHtml = '';
  if (item.openTodos && item.openTodos.length > 0) {
    bodyHtml = item.openTodos.map(t => `
      <div class="card-todo ${t.checked?'done':''}">${formatDates(escapeHtml(t.text))}</div>
    `).join('');
  } else if (item.lastLog) {
    bodyHtml = `<div class="card-last-log"><span class="label">最後</span>${formatDates(escapeHtml(item.lastLog))}</div>`;
  } else {
    bodyHtml = `<div class="card-body-empty">（尚無待辦或紀錄）</div>`;
  }

  // Footer: one-line, no warm bg, includes contact at the end
  const fmt = n => n.toLocaleString('zh-TW');
  let footerInner = '';
  if (item.kind === 'project') {
    const q = item.quoteRaw;
    if (q && q !== '未報價' && q !== '未成案' && item.quoteAmount > 0) {
      footerInner += `<span class="card-money">
        <span class="card-price">${fmt(item.quoteAmount)}<span class="unit">未稅</span></span>
        ${item.invoicedAmount > 0 ? `<span class="card-invoiced">已開 ${fmt(item.invoicedAmount)}</span>` : ''}
      </span>`;
      if (item.splits.length > 0) {
        footerInner += `<span class="card-splits-line">${item.splits.map(s=>escapeHtml(s)).join(' · ')}</span>`;
      }
    } else if (q) {
      footerInner += `<span class="card-money"><span class="card-price na">${escapeHtml(q)}</span></span>`;
    }
  } else if (item.kind === 'brand') {
    if (item.fee) {
      footerInner += `<span class="card-money"><span class="fee-line">${escapeHtml(item.fee)}</span></span>`;
    }
  }
  const footerHtml = footerInner ? `<div class="card-footer-warm">${footerInner}</div>` : '';

  // Bottom meta：左側 date、右側 contact（窗口統一收在底卡右下角）
  const metaPieces = [];
  if (item.startDateRaw) metaPieces.push(`${item.startDateRaw} 開始`);
  if (item.lastUpdate) metaPieces.push(`更新於 ${item.lastUpdate.getMonth()+1}/${item.lastUpdate.getDate()}`);
  const metaTextBottom = metaPieces.length ? metaPieces.join(' · ') : '';
  const contactHtml = item.contact
    ? `<span class="card-footer-contact">${escapeHtml(item.contact)}</span>`
    : '';
  const metaBottom = (metaTextBottom || contactHtml)
    ? `<div class="card-meta-bottom"><span class="meta-date">${metaTextBottom}</span>${contactHtml}</div>`
    : '';

  // Cal icon：只在有單日 event（非範圍）時顯示，位置在白底區的右下（footer 上方）
  const hasSingleDayEvent = item.events.some(e => !e.endDate);
  const calRow = hasSingleDayEvent
    ? `<div class="card-cal-row"><button class="card-cal-btn" title="${item.events.filter(e=>!e.endDate).length} 個日期" onclick="openCardCal(event, ${idx})">${I.calendar}</button></div>`
    : '';

  // Footer：獨立一張「底卡」，絕對定位掛在主卡片下方。
  // 靜止時只露 5px 色條；hover 時主卡上浮、底卡往下滑分開。
  const footCardHtml = (footerHtml || metaBottom)
    ? `<div class="card-foot-card" onclick="toggleCardFoot(event, ${idx})">
        ${footerHtml}
        ${metaBottom}
      </div>`
    : '';

  return `<div class="card-wrap ${bucket === 'done' ? 'is-done' : ''} ${bucket === 'waiting' ? 'is-waiting' : ''}" id="card-${idx}" data-bucket="${bucket}" data-kind="${item.kind}-${item.brandType||''}">
    <div class="${cardClasses.join(' ')}">
      ${cornerTagHtml}
      ${headHtml}
      <div class="card-body">${bodyHtml}</div>
      ${calRow}
    </div>
    ${footCardHtml}
  </div>`;
}

window.toggleCardFoot = function(ev, idx) {
  ev.stopPropagation();
  const wrap = document.getElementById('card-' + idx);
  if (!wrap) return;
  wrap.classList.toggle('foot-open');
};

// ——— Format dates inline ———
function formatDates(text) {
  const today = startOfDay(new Date());
  let result = text.replace(/(\d{4})-(\d{1,2})-(\d{1,2})/g, (match, y, m, d) => {
    const target = startOfDay(new Date(+y, +m - 1, +d));
    const diff = Math.round((target - today) / 86400000);
    const wd = WEEKDAYS[target.getDay()];
    const short = `${+m}/${+d}`;
    let label, cls;
    if (diff === 0) { label = `${short}(${wd}) 今天`; cls = 'today'; }
    else if (diff === 1) { label = `${short}(${wd}) 明天`; cls = 'tomorrow'; }
    else if (diff === -1) { label = `${short}(${wd}) 昨天`; cls = 'past'; }
    else if (diff < 0) { label = `${short}(${wd})`; cls = 'past'; }
    else if (diff < 7) { label = `${short} 本週${wd}`; cls = ''; }
    else if (diff < 14) { label = `${short} 下週${wd}`; cls = ''; }
    else { label = `${short}(${wd})`; cls = ''; }
    return `<span class="date-tag ${cls}">${label}</span>`;
  });
  result = result.replace(/（([^）]+)）/g, '<span class="annotation">（$1）</span>');
  return result;
}

// ——— Filter / sort / group ———
function getFilteredItems() {
  const all = [...state.projects, ...state.brand, ...state.groupBuy];
  const allowedBuckets = state.prefs.statuses;
  return all.filter(it => allowedBuckets.includes(statusBucket(it.status)));
}

function sortItems(items) {
  const s = state.prefs.sort;
  const arr = [...items];
  if (s === 'updated') {
    arr.sort((a,b) => (b.lastUpdate?.getTime()||0) - (a.lastUpdate?.getTime()||0));
  } else if (s === 'amount') {
    arr.sort((a,b) => (b.quoteAmount||0) - (a.quoteAmount||0));
  } else if (s === 'start') {
    arr.sort((a,b) => {
      const da = a.startDateRaw ? new Date(a.startDateRaw).getTime() : 0;
      const db = b.startDateRaw ? new Date(b.startDateRaw).getTime() : 0;
      return db - da;
    });
  } else if (s === 'name') {
    arr.sort((a,b) => a.name.localeCompare(b.name, 'zh-Hant'));
  }
  // 等待中的案子一律排到最後（穩定分區）
  const front = [], back = [];
  for (const it of arr) {
    (statusBucket(it.status) === 'waiting' ? back : front).push(it);
  }
  return [...front, ...back];
}

function groupItems(items) {
  const g = state.prefs.groupBy;
  if (g === 'none') return [{ key: '全部', items }];
  if (g === 'status') {
    const order = [['active','進行中'],['waiting','等待中'],['hold','考慮中'],['done','已完成']];
    return order.map(([key,label]) => ({ key: label, items: items.filter(it => statusBucket(it.status) === key) }))
      .filter(g => g.items.length > 0);
  }
  if (g === 'kind') {
    const order = [
      ['project','工作室專案', it => it.kind === 'project'],
      ['promo','業配', it => it.brandType === '業配'],
      ['reels','Reels', it => it.brandType === 'Reels'],
      ['group','團購 & 公關品', it => it.brandType === '團購'],
    ];
    return order.map(([k, label, fn]) => ({ key: label, items: items.filter(fn) }))
      .filter(g => g.items.length > 0);
  }
  return [{ key: '全部', items }];
}

// ——— Ideas (待剪想法) rendering ———
function renderIdeasSection() {
  const ideas = state.ideas || [];
  const open = ideas.filter(i => !i.done);
  const done = ideas.filter(i => i.done);
  const rows = [...open, ...done];
  const listHtml = rows.length === 0
    ? `<div class="ideas-empty">（還沒有想法）</div>`
    : `<div class="ideas-list">${rows.map(i => `
        <div class="ideas-row ${i.done?'done':''}">
          <span class="ideas-row-text">${escapeHtml(i.text)}</span>
        </div>
      `).join('')}</div>`;

  return `<div class="group-section ideas-group">
    <div class="group-header">
      <h2>強強滾一家 · IG 待剪想法</h2>
      <span class="count">${open.length}</span>
    </div>
    ${listHtml}
  </div>`;
}

// ——— Render dashboard body ———
function renderBody() {
  const filtered = getFilteredItems();
  const sorted = sortItems(filtered);
  const groups = groupItems(sorted);
  const container = document.getElementById('cardsArea');
  if (!container) return;

  let html = '';
  if (groups.length === 0) {
    html = `<div class="card-body-empty" style="padding:48px;text-align:center;">（沒有符合條件的項目）</div>`;
  } else {
    let idx = 0;
    for (const g of groups) {
      html += `<div class="group-section">
        <div class="group-header"><h2>${escapeHtml(g.key)}</h2><span class="count">${g.items.length}</span></div>
        <div class="cards-grid">${g.items.map(it => renderCard(it, idx++)).join('')}</div>
      </div>`;
    }
  }
  // Ideas ledger — always rendered at bottom
  html += renderIdeasSection();

  container.innerHTML = html;

  // Update status chip counts in drawer
  const counts = { active:0, waiting:0, done:0, hold:0 };
  for (const it of [...state.projects, ...state.brand, ...state.groupBuy]) {
    counts[statusBucket(it.status)]++;
  }
  for (const k of Object.keys(counts)) {
    const el = document.querySelector(`#filterDrawer [data-status="${k}"] .count`);
    if (el) el.textContent = ' ' + counts[k];
  }
}

// ——— Calendar (unified: card click + toolbar click 都走 openMasterCal) ———
const IMPORTANT_TYPES = new Set(['start', 'todo', 'campaign']);

function formatYM(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }

// 清掉事件文字裡的日期前綴，月曆格子只顯示語意
function stripDate(t) {
  if (!t) return '';
  return String(t)
    .replace(/\b\d{4}-\d{1,2}-\d{1,2}\b/g, '')
    .replace(/\d{4}\s*年\s*\d{1,2}\s*月\s*\d{1,2}\s*日?/g, '')
    .replace(/^\s*[、，,·\-—\s]+/, '')
    .trim();
}

function truncate(s, n) {
  s = String(s || '');
  return s.length > n ? s.slice(0, n - 1) + '…' : s;
}

function getItemByCardIdx(idx) {
  const filtered = getFilteredItems();
  const sorted = sortItems(filtered);
  const groups = groupItems(sorted);
  let cnt = 0;
  for (const g of groups) for (const it of g.items) {
    if (cnt === idx) return it;
    cnt++;
  }
  return null;
}

function getAllEvents() {
  const all = [...state.projects, ...state.brand, ...state.groupBuy];
  const out = [];
  for (const it of all) {
    if (state.masterFilter && it !== state.masterFilter) continue;
    for (const e of it.events) {
      if (!IMPORTANT_TYPES.has(e.type)) continue;
      out.push(Object.assign({}, e, { project: it }));
    }
  }
  return out;
}

function brandClass(item) {
  if (item.kind === 'project') return '';
  if (item.brandType === '業配') return 'brand-promo';
  if (item.brandType === 'Reels') return 'brand-reels';
  if (item.brandType === '團購') return 'brand-group';
  return '';
}

function pickInitialMonth() {
  return new Date();
}

window.openCardCal = function(ev, idx) {
  ev.stopPropagation();
  const item = getItemByCardIdx(idx);
  openMasterCal(item);
};

window.openMasterCal = function(projectFilter) {
  state.masterFilter = projectFilter || null;
  state.masterMonth = state.masterMonth || pickInitialMonth();
  const modal = document.getElementById('masterModal');
  modal.innerHTML = renderMasterModal(state.masterMonth);
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
};

window.closeMasterCal = function() {
  const modal = document.getElementById('masterModal');
  modal.classList.remove('open');
  modal.innerHTML = '';
  state.masterFilter = null;
  closeDaySheet();
  document.body.style.overflow = '';
};

window.masterMonth = function(delta) {
  const d = new Date(state.masterMonth);
  d.setMonth(d.getMonth() + delta);
  state.masterMonth = d;
  document.getElementById('masterModal').innerHTML = renderMasterModal(d);
};

window.masterGoToday = function() {
  state.masterMonth = new Date();
  document.getElementById('masterModal').innerHTML = renderMasterModal(state.masterMonth);
};

function renderMasterModal(monthDate) {
  const events = getAllEvents();
  const y = monthDate.getFullYear(), m = monthDate.getMonth();
  const first = new Date(y, m, 1);
  const startDow = first.getDay();
  const lastDay = new Date(y, m+1, 0).getDate();
  const today = startOfDay(new Date());
  const monthEnd = new Date(y, m+1, 0);

  // events by day (含跨月份的 range)
  const byDay = {};
  for (const e of events) {
    const sameMonth = e.date.getFullYear() === y && e.date.getMonth() === m;
    if (sameMonth) {
      const d = e.date.getDate();
      (byDay[d] = byDay[d] || []).push(e);
    }
    if (e.endDate) {
      const overlaps = e.date <= monthEnd && e.endDate >= first;
      if (overlaps) {
        const sStart = (e.date < first) ? 1 : e.date.getDate();
        const eEnd = (e.endDate > monthEnd) ? lastDay : e.endDate.getDate();
        for (let d = sStart; d <= eEnd; d++) {
          const arr = byDay[d] = byDay[d] || [];
          if (!arr.includes(e)) arr.push(e);
        }
      }
    }
  }

  // Build grid：7 欄 weekday header + 6 週格子撐滿視窗
  let gridCells = '';
  for (const wd of WEEKDAYS) gridCells += `<div class="wd">${wd}</div>`;
  // 前導空格
  for (let i = 0; i < startDow; i++) {
    const fillDow = i;
    const isWeekend = fillDow === 0 || fillDow === 6;
    gridCells += `<div class="mc-cell other ${isWeekend?'weekend':''}"></div>`;
  }
  for (let d = 1; d <= lastDay; d++) {
    const dt = new Date(y, m, d);
    const dow = dt.getDay();
    const isToday = dt.getTime() === today.getTime();
    const isWeekend = dow === 0 || dow === 6;
    const evs = byDay[d] || [];
    const visible = evs.slice(0, 4);
    const more = evs.length - visible.length;
    const classes = ['mc-cell'];
    if (isToday) classes.push('today');
    if (isWeekend) classes.push('weekend');
    gridCells += `<div class="${classes.join(' ')}" onclick="openDaySheet(${y},${m},${d})">
      <div class="day-num">${d}</div>
      ${visible.map(e => {
        const cls = brandClass(e.project);
        const isRange = !!e.endDate;
        const isMaster = !state.masterFilter;
        const fullLabel = `${e.project.name} · ${e.text}`;
        const rawText = stripDate(e.text) || '';
        const label = isMaster
          ? (rawText ? `${e.project.name}｜${rawText}` : e.project.name)
          : (rawText || e.project.name);
        const shortText = truncate(label, 22);
        return `<div class="mc-event ${cls} ${isRange?'range':''}" title="${escapeHtml(fullLabel)}" onclick="event.stopPropagation(); closeMasterCal(); jumpToCard('${escapeHtml(e.project.name)}')">${escapeHtml(shortText)}</div>`;
      }).join('')}
      ${more > 0 ? `<div class="mc-more">+${more} 更多</div>` : ''}
    </div>`;
  }
  // 補滿 6 週（42 格）
  const filled = startDow + lastDay;
  const trailing = (7 - (filled % 7)) % 7;
  for (let i = 0; i < trailing; i++) {
    const dow = (startDow + lastDay + i) % 7;
    const isWeekend = dow === 0 || dow === 6;
    gridCells += `<div class="mc-cell other ${isWeekend?'weekend':''}"></div>`;
  }

  const filterLabel = state.masterFilter
    ? `<span class="filter-label">${escapeHtml(state.masterFilter.name)}</span>`
    : '<span class="filter-label">全部案件</span>';

  return `
    <div class="modal-card" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-header-left">
          <h2>${I.calendar}<span>月曆</span></h2>
          ${filterLabel}
        </div>
        <div class="modal-nav">
          <button class="modal-nav-btn" onclick="masterMonth(-1)" title="上個月">${I.arrowL}</button>
          <div class="modal-nav-ym">${y} 年 ${m+1} 月</div>
          <button class="modal-nav-btn" onclick="masterMonth(1)" title="下個月">${I.arrowR}</button>
          <button class="modal-today-btn" onclick="masterGoToday()">今天</button>
          <button class="modal-close-x" onclick="closeMasterCal()" title="關閉">✕</button>
        </div>
      </div>
      <div class="modal-body">
        <div class="mc-grid">${gridCells}</div>
      </div>
      <div class="day-sheet" id="daySheet"></div>
    </div>
  `;
}

window.openDaySheet = function(y, m, d) {
  const sheet = document.getElementById('daySheet');
  if (!sheet) return;
  const target = new Date(y, m, d);
  const events = getAllEvents().filter(e => {
    const inSingle = e.date.getFullYear() === y && e.date.getMonth() === m && e.date.getDate() === d;
    const inRange = e.endDate && e.date <= target && e.endDate >= target;
    return inSingle || inRange;
  });
  const wd = WEEKDAYS[target.getDay()];
  const header = `<div class="day-sheet-head">
    <h3>${m+1}/${d}（${wd}）<span class="count">${events.length} 則</span></h3>
    <button class="modal-close-x" onclick="closeDaySheet()">✕</button>
  </div>`;
  const isMaster = !state.masterFilter;
  const body = events.length === 0
    ? '<div class="card-body-empty">（這天沒事）</div>'
    : `<div class="day-sheet-list">${events.map(e => {
        const cls = brandClass(e.project);
        const whatText = stripDate(e.text) || e.project.name;
        const whoText = isMaster
          ? (e.project.name + (e.time ? ' · ' + e.time : ''))
          : (e.time || '');
        return `<div class="ds-row ${cls}" onclick="closeMasterCal(); jumpToCard('${escapeHtml(e.project.name)}')">
          <span class="ds-bar"></span>
          <div class="ds-main">
            <div class="ds-what">${escapeHtml(whatText)}</div>
            ${whoText ? `<div class="ds-who">${escapeHtml(whoText)}</div>` : ''}
          </div>
        </div>`;
      }).join('')}</div>`;
  sheet.innerHTML = header + body;
  sheet.classList.add('open');
};

window.closeDaySheet = function() {
  const sheet = document.getElementById('daySheet');
  if (sheet) sheet.classList.remove('open');
};

window.jumpToCard = function(projectName) {
  // Find card by data; need to compare by item name → re-search rendered cards
  const cards = document.querySelectorAll('.card');
  for (const c of cards) {
    const titleEl = c.querySelector('.card-title');
    if (titleEl && titleEl.textContent.trim().startsWith(projectName)) {
      c.scrollIntoView({ behavior: 'smooth', block: 'center' });
      c.classList.remove('flash');
      void c.offsetWidth;
      c.classList.add('flash');
      setTimeout(() => c.classList.remove('flash'), 1800);
      return;
    }
  }
};

// ——— Loaders ———
async function loadProjects() {
  try {
    const files = await fetchPublic('Projects');
    if (!Array.isArray(files)) return [];
    const mdFiles = files.filter(f => f.name.endsWith('.md'));
    const items = await Promise.all(mdFiles.map(async f => {
      const data = await fetchPublic(`Projects/${encodeURIComponent(f.name)}`);
      return parseProject(decodeMd(data));
    }));
    return items;
  } catch (e) {
    showToast(e.message, true);
    return [];
  }
}

async function loadBrand() {
  const brandFiles = [
    { path: 'Brand/%E5%BC%B7%E5%BC%B7%E6%BB%BE%E4%B8%80%E5%AE%B6-%E6%A5%AD%E9%85%8D.md', type: '業配' },
    { path: 'Brand/%E5%BC%B7%E5%BC%B7%E6%BB%BE%E4%B8%80%E5%AE%B6-Reels.md', type: 'Reels' },
  ];
  const out = [];
  for (const f of brandFiles) {
    try {
      const data = await fetchPublic(f.path);
      out.push(...parseBrandCollab(decodeMd(data), f.type));
    } catch {}
  }
  return out;
}

async function loadGroupBuy() {
  try {
    const data = await fetchPublic('Brand/%E5%BC%B7%E5%BC%B7%E6%BB%BE%E4%B8%80%E5%AE%B6-%E5%9C%98%E8%B3%BC.md');
    return parseGroupBuy(decodeMd(data));
  } catch { return []; }
}

function parseIdeas(md) {
  // Sections: 待剪 (open) and 已剪 (done). Each bullet line is one idea.
  const lines = md.split('\n');
  const out = [];
  let section = '';
  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (line.startsWith('## ')) { section = line.replace(/^##+\s*/, ''); continue; }
    if (line.startsWith('# ')) continue;
    if (line.startsWith('>')) continue;
    const m = line.match(/^- \[([ x])\] (.+)/i) || line.match(/^- (.+)/);
    if (!m) continue;
    const text = (m[2] || m[1] || '').trim();
    if (!text) continue;
    // skip the placeholder example entry
    if (text.startsWith('（') && text.endsWith('）')) continue;
    const done = section.includes('已剪') || section.includes('完成') || (line.match(/^- \[x\]/i) !== null);
    out.push({ text, done });
  }
  return out;
}

async function loadIdeas() {
  try {
    const data = await fetchPublic('Brand/%E5%BC%B7%E5%BC%B7%E6%BB%BE%E4%B8%80%E5%AE%B6-%E5%BE%85%E5%89%AA%E6%83%B3%E6%B3%95.md');
    return parseIdeas(decodeMd(data));
  } catch { return []; }
}

async function loadAll() {
  const cards = document.getElementById('cardsArea');
  if (cards) cards.innerHTML = `<div class="card-body-empty" style="padding:48px;text-align:center;">載入中…</div>`;
  const [projects, brand, groupBuy, ideas] = await Promise.all([loadProjects(), loadBrand(), loadGroupBuy(), loadIdeas()]);
  state.projects = projects;
  state.brand = brand;
  state.groupBuy = groupBuy;
  state.ideas = ideas;
  renderBody();
  updateLoadTime();
}

function updateLoadTime() {
  const now = new Date();
  const ts = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const el = document.getElementById('loadTime');
  if (el) el.textContent = `讀取時間：${ts}`;
}

function renderShell() {
  document.getElementById('app').innerHTML = `
    <div class="hero">
      <div class="hero-inner">
        <h1 class="hero-title">阿忠戰情表</h1>
        <div class="hero-time" id="loadTime"></div>
      </div>
    </div>
    ${renderToolbar()}
    <div class="main">
      <div id="cardsArea"></div>
    </div>
  `;
}

window.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const modal = document.getElementById('masterModal');
    if (modal && modal.classList.contains('open')) {
      const sheet = document.getElementById('daySheet');
      if (sheet && sheet.classList.contains('open')) closeDaySheet();
      else closeMasterCal();
    }
  }
});

renderShell();
loadAll();
</script>
