<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>阿忠 Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

  :root {
    /* —— Paper / Ink (中性紙墨) —— */
    --paper:        #F8F4E9;
    --paper-2:      #F1EADA;
    --paper-3:      #E8E0CC;
    --card-bg:      #FCFAF3;
    --ink:          #1F2A24;
    --ink-soft:     #55615A;
    --ink-mute:     #8A8F85;
    --hairline:     #D9D1BD;
    --hairline-soft:#E5DDC8;

    /* —— Moss (主強調) —— */
    --moss-900: #1E3A2F;
    --moss-700: #2F5A46;
    --moss-500: #5B8470;
    --moss-200: #C8D6CC;
    --moss-50:  #ECF1EC;

    /* —— Status (大地化) —— */
    --status-active: #2F5A46;
    --status-wait:   #C9A56A;
    --status-done:   #A8A89E;
    --status-hold:   #B88A6A;

    /* —— 分類色 —— */
    --clay-pink:  #C8907A;
    --sand:       #D4B896;
    --sage:       #9BAE96;
    --terracotta: #B8563A;

    /* —— Gradients (僅 3 處) —— */
    --grad-hero:        linear-gradient(135deg, #2F5A46 0%, #1E3A2F 55%, #17302A 100%);
    --grad-paper:       linear-gradient(180deg, #F8F4E9 0%, #F1EADA 100%);
    --grad-card-hover:  linear-gradient(180deg, rgba(47,90,70,0.00) 0%, rgba(47,90,70,0.05) 100%);

    /* —— Shadows (軟陰影、偏綠) —— */
    --shadow-sm: 0 1px 2px rgba(31,42,36,0.04), 0 1px 1px rgba(31,42,36,0.06);
    --shadow-md: 0 6px 20px -8px rgba(31,42,36,0.12), 0 2px 4px rgba(31,42,36,0.05);
    --shadow-lg: 0 18px 40px -20px rgba(31,42,36,0.22);

    /* —— Radius —— */
    --r-sm: 8px;
    --r-md: 14px;
    --r-lg: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--grad-paper) fixed;
    color: var(--ink);
    line-height: 1.6;
    font-weight: 500;
    -webkit-font-smoothing: antialiased;
  }

  /* —— Hero —— */
  .hero {
    background: var(--grad-hero);
    color: #fff;
    padding: 28px 24px 30px;
    position: relative;
    overflow: hidden;
  }
  .hero::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 90% 20%, rgba(200,214,204,0.18), transparent 55%);
    pointer-events: none;
  }
  .hero-inner {
    max-width: 1280px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .hero-title {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 900;
    font-size: 1.9em;
    letter-spacing: -0.005em;
    color: rgba(255,255,255,0.96);
    line-height: 1.1;
  }
  .hero-time {
    font-size: 0.74em;
    color: rgba(255,255,255,0.58);
    letter-spacing: 0.04em;
    font-weight: 500;
  }

  /* —— Toolbar (sticky) —— */
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 40;
    background: rgba(248,244,233,0.82);
    backdrop-filter: saturate(180%) blur(14px);
    -webkit-backdrop-filter: saturate(180%) blur(14px);
    border-bottom: 1px solid var(--hairline);
  }
  .toolbar-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .seg {
    display: inline-flex;
    background: var(--paper-2);
    border-radius: 999px;
    padding: 3px;
    box-shadow: inset 0 0 0 1px var(--hairline);
  }
  .seg button {
    border: 0;
    background: transparent;
    color: var(--ink-soft);
    font-family: inherit;
    font-weight: 700;
    font-size: 0.78em;
    padding: 7px 14px;
    border-radius: 999px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.18s ease;
  }
  .seg button.on {
    background: var(--moss-700);
    color: #fff;
    box-shadow: var(--shadow-sm);
  }
  .toolbar-spacer { flex: 1; }
  .sort-select {
    border: 1px solid var(--hairline);
    background: var(--card-bg);
    color: var(--ink);
    font-family: inherit;
    font-size: 0.82em;
    font-weight: 700;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
  }
  .icon-btn {
    width: 38px; height: 38px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 999px;
    background: var(--moss-700);
    color: #fff;
    border: 0;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .icon-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .icon-btn.ghost {
    background: var(--card-bg);
    color: var(--ink);
    border: 1px solid var(--hairline);
  }
  .icon-btn svg { width: 18px; height: 18px; }

  .chips-row {
    width: 100%;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .chip-toggle {
    border: 1px solid var(--hairline);
    background: var(--card-bg);
    color: var(--ink-soft);
    font-family: inherit;
    font-weight: 700;
    font-size: 0.78em;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    letter-spacing: 0.04em;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s ease;
  }
  .chip-toggle .dot {
    width: 8px; height: 8px; border-radius: 999px;
    background: var(--ink-mute);
  }
  .chip-toggle.on {
    background: var(--moss-700);
    color: #fff;
    border-color: var(--moss-700);
  }
  .chip-toggle.on .dot { background: rgba(255,255,255,0.8); }
  .chip-toggle .count {
    background: rgba(0,0,0,0.08);
    border-radius: 999px;
    padding: 0 6px;
    font-size: 0.85em;
    font-weight: 800;
  }
  .chip-toggle.on .count { background: rgba(255,255,255,0.18); }

  /* —— Main —— */
  .main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 28px 24px 80px;
  }
  .cards-grid { grid-template-columns: 1fr; }
  @media (min-width: 640px) { .cards-grid { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 1024px) { .cards-grid { grid-template-columns: 1fr 1fr 1fr; } }
  .group-section + .group-section { margin-top: 36px; }
  .group-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 0 0 18px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--hairline);
  }
  .group-header h2 {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 900;
    font-size: 1.05em;
    color: var(--ink);
    letter-spacing: 0.02em;
  }
  .group-header .count {
    font-weight: 700;
    color: var(--ink-mute);
    font-size: 0.85em;
  }

  .cards-grid {
    display: grid;
    gap: 18px;
  }

  /* —— Card v3 (editorial minimal) —— */
  .card {
    position: relative;
    background: var(--card-bg);
    border: 1px solid var(--hairline);
    border-radius: var(--r-md);
    padding: 22px 24px 54px;
    box-shadow: var(--shadow-sm);
    transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.2s ease;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .card::after {
    content: '';
    position: absolute; inset: 0;
    background: var(--grad-card-hover);
    opacity: 0;
    transition: opacity 0.2s ease;
    pointer-events: none;
    border-radius: inherit;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }
  .card:hover::after { opacity: 1; }

  .card.is-waiting { background: var(--paper-2); }
  .card.is-done { opacity: 0.72; }
  .card.flash {
    animation: flash-card 1.6s ease;
  }
  @keyframes flash-card {
    0%, 100% { box-shadow: var(--shadow-sm); }
    20%, 60% { box-shadow: 0 0 0 4px var(--moss-200), var(--shadow-md); }
  }

  .card-title {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 900;
    font-size: 1.25em;
    color: var(--ink);
    letter-spacing: -0.008em;
    line-height: 1.28;
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 10px;
  }
  .card-title .pause-icon {
    color: var(--status-wait);
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    transform: translateY(2px);
  }
  .card-title .pause-icon svg { width: 14px; height: 14px; display: block; }

  .card-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .card-tags .pill {
    font-size: 0.72em;
    font-weight: 800;
    letter-spacing: 0.08em;
    padding: 4px 12px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
  }
  .pill-status.is-active  { background: var(--moss-700); color: #fff; }
  .pill-status.is-waiting { background: var(--status-wait); color: #3D2E12; }
  .pill-status.is-done    { background: var(--status-done); color: #2E332E; }
  .pill-status.is-hold    { background: var(--status-hold); color: #fff; }
  .pill-contact {
    background: var(--moss-50);
    color: var(--moss-700);
    letter-spacing: 0.02em;
  }

  hr.hairline {
    border: 0;
    border-top: 1px solid var(--hairline-soft);
    margin: 0;
  }

  .card-body {
    padding: 12px 0;
    flex: 1 0 auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .card-body-empty {
    color: var(--ink-mute);
    font-size: 0.84em;
    font-style: italic;
  }
  .card-todo {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 0.86em;
    line-height: 1.55;
    color: var(--ink);
  }
  .card-todo .marker {
    width: 6px; height: 6px;
    border-radius: 999px;
    background: var(--moss-700);
    margin-top: 9px;
    flex-shrink: 0;
  }
  .card-todo.done .marker { background: var(--ink-mute); }
  .card-todo.done span { text-decoration: line-through; color: var(--ink-mute); }
  .card-last-log {
    font-size: 0.85em;
    color: var(--ink-soft);
    line-height: 1.55;
  }
  .card-last-log .label {
    display: inline-block;
    font-size: 0.78em;
    font-weight: 700;
    color: var(--moss-700);
    background: var(--moss-50);
    padding: 1px 8px;
    border-radius: 999px;
    margin-right: 6px;
  }

  .card-footer {
    padding-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card-money {
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 14px;
  }
  .card-price {
    font-family: 'Anton', 'Noto Sans TC', sans-serif;
    font-weight: 900;
    color: var(--ink);
    font-size: 1.42em;
    letter-spacing: 0.02em;
    line-height: 1;
  }
  .card-price .unit {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    font-size: 0.46em;
    color: var(--ink-soft);
    margin-left: 6px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .card-price.na {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    color: var(--ink-mute);
    font-size: 0.88em;
  }
  .card-invoiced {
    font-size: 0.78em;
    color: var(--ink-soft);
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .card-splits {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .split-tag {
    font-size: 0.7em;
    font-weight: 700;
    color: #5C4528;
    background: var(--sand);
    padding: 3px 10px;
    border-radius: 999px;
    letter-spacing: 0.02em;
  }
  .fee-line {
    font-family: 'Anton', 'Noto Sans TC', sans-serif;
    font-weight: 900;
    font-size: 0.96em;
    color: var(--ink);
    letter-spacing: 0.01em;
    line-height: 1.5;
  }

  .card-meta-bottom {
    position: absolute;
    left: 24px;
    right: 14px;
    bottom: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    font-size: 0.7em;
    color: var(--ink-mute);
    font-weight: 600;
    letter-spacing: 0.02em;
    z-index: 2;
  }
  .card-cal-btn {
    width: 28px;
    height: 28px;
    border-radius: 999px;
    background: var(--moss-50);
    color: var(--moss-700);
    border: 1px solid var(--moss-200);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s ease;
    flex-shrink: 0;
  }
  .card-cal-btn:hover { background: var(--moss-700); color: #fff; }
  .card-cal-btn svg { width: 13px; height: 13px; }

  /* —— Date tags (inline) —— */
  .date-tag {
    display: inline-block;
    font-weight: 700;
    font-size: 0.92em;
    color: var(--moss-700);
    letter-spacing: 0.01em;
  }
  .date-tag.past { color: var(--ink-mute); font-weight: 500; }
  .date-tag.today {
    color: #fff;
    background: var(--terracotta);
    padding: 0 8px;
    border-radius: 6px;
    font-weight: 900;
  }
  .date-tag.tomorrow {
    color: #3D2E12;
    background: var(--status-wait);
    padding: 0 8px;
    border-radius: 6px;
    font-weight: 900;
  }
  .annotation { color: var(--moss-500); opacity: 0.8; font-size: 0.92em; }

  /* —— Fullscreen calendar modal (Google Calendar-ish) —— */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(31,42,36,0.35);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 200;
    display: none;
  }
  .modal-backdrop.open { display: block; }
  .modal-card {
    position: absolute;
    inset: 0;
    background: var(--paper);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .modal-header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--hairline);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    background: var(--card-bg);
  }
  .modal-header-left {
    display: flex; align-items: center; gap: 12px;
  }
  .modal-header h2 {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 900;
    font-size: 1.1em;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .modal-header h2 svg { width: 20px; height: 20px; color: var(--moss-700); }
  .modal-header .filter-label {
    font-size: 0.78em;
    font-weight: 700;
    color: var(--moss-700);
    background: var(--moss-50);
    padding: 4px 12px;
    border-radius: 999px;
    letter-spacing: 0.02em;
  }
  .modal-nav {
    display: flex; align-items: center; gap: 6px;
  }
  .modal-nav-btn {
    width: 36px; height: 36px;
    border-radius: 999px;
    border: 0;
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    font-size: 1.15em;
    line-height: 1;
    font-weight: 700;
    transition: background 0.15s ease;
  }
  .modal-nav-btn:hover { background: var(--paper-2); }
  .modal-nav-ym {
    font-weight: 900;
    font-size: 1.0em;
    color: var(--ink);
    min-width: 96px;
    text-align: center;
    letter-spacing: 0.02em;
  }
  .modal-today-btn {
    font-size: 0.78em;
    font-weight: 700;
    padding: 7px 14px;
    border-radius: 999px;
    border: 1px solid var(--hairline);
    background: var(--card-bg);
    color: var(--ink);
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  .modal-today-btn:hover { border-color: var(--moss-500); }
  .modal-close-x {
    width: 36px; height: 36px;
    border-radius: 999px;
    border: 0;
    background: var(--paper-2);
    color: var(--ink);
    cursor: pointer;
    font-size: 1.1em;
    line-height: 1;
    margin-left: 6px;
  }
  .modal-close-x:hover { background: var(--paper-3); }

  .modal-body {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 14px 22px 22px;
  }
  .mc-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-auto-rows: 1fr;
    gap: 1px;
    background: var(--hairline-soft);
    border: 1px solid var(--hairline-soft);
    border-radius: var(--r-sm);
    overflow: hidden;
    flex: 1;
    min-height: 0;
    font-size: 0.85em;
  }
  .mc-grid .wd {
    text-align: center;
    color: var(--ink-mute);
    font-weight: 800;
    padding: 8px 0;
    font-size: 0.78em;
    letter-spacing: 0.08em;
    background: var(--card-bg);
    text-transform: uppercase;
  }
  .mc-grid .wd.weekend { color: var(--ink-mute); opacity: 0.75; }
  .mc-cell {
    background: var(--card-bg);
    min-height: 0;
    padding: 6px 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    cursor: pointer;
    transition: background 0.12s ease;
    overflow: hidden;
  }
  .mc-cell:hover { background: var(--paper-2); }
  .mc-cell.other { background: var(--paper-2); }
  .mc-cell.other .day-num { color: var(--ink-mute); opacity: 0.55; }
  .mc-cell.weekend .day-num { color: var(--ink-mute); }
  .mc-cell .day-num {
    font-weight: 700;
    font-size: 0.82em;
    color: var(--ink);
    padding: 2px 4px;
    line-height: 1;
    align-self: flex-start;
  }
  .mc-cell.today .day-num {
    background: var(--terracotta);
    color: #fff;
    border-radius: 999px;
    padding: 3px 7px;
    font-weight: 900;
  }
  .mc-event {
    font-size: 0.74em;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 3px;
    color: #fff;
    background: var(--moss-700);
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    cursor: pointer;
    letter-spacing: 0.01em;
    line-height: 1.4;
  }
  .mc-event:hover { filter: brightness(1.08); }
  .mc-event.brand-promo { background: var(--clay-pink); }
  .mc-event.brand-reels { background: var(--sage); color: #2A3A2C; }
  .mc-event.brand-group { background: var(--sand); color: #5C4528; }
  .mc-event.range {
    background: linear-gradient(90deg, var(--clay-pink) 0%, var(--terracotta) 100%);
  }
  .mc-more {
    font-size: 0.68em;
    color: var(--ink-soft);
    font-weight: 700;
    padding: 0 4px;
  }

  /* —— Day sheet (bottom) —— */
  .day-sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    max-height: 58vh;
    background: var(--paper);
    border-top: 1px solid var(--hairline);
    box-shadow: 0 -18px 40px -20px rgba(31,42,36,0.22);
    padding: 18px 24px 24px;
    transform: translateY(100%);
    transition: transform 0.24s ease;
    z-index: 210;
    overflow-y: auto;
  }
  .day-sheet.open { transform: translateY(0); }
  .day-sheet-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .day-sheet-head h3 {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 900;
    font-size: 1.1em;
    color: var(--ink);
    letter-spacing: 0.01em;
  }
  .day-sheet-head .count {
    font-weight: 700;
    color: var(--ink-mute);
    font-size: 0.88em;
    margin-left: 8px;
  }
  .day-sheet-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .ds-row {
    background: var(--card-bg);
    border: 1px solid var(--hairline-soft);
    padding: 12px 14px;
    border-radius: var(--r-sm);
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

<div id="app"><div style="text-align:center;padding:80px;color:var(--ink-mute);">載入中...</div></div>
<div class="toast" id="toast"></div>
<div class="modal-backdrop" id="masterModal" onclick="if(event.target===this)closeMasterCal()"></div>

<script>
const OWNER = 'ArChung';
const REPO = 'vault-dashboard';
const BRANCH = 'master';
const MD_CACHE_KEY = 'archung-md-cache-v1';
const PREFS_KEY = 'archung-prefs-v1';

// ——— Icons ———
const I = {
  search:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>',
  calendar:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="17" rx="2.5"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4"/></svg>',
  refresh: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15.6-6.1L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15.6 6.1L3 16"/><path d="M3 21v-5h5"/></svg>',
  pause:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9 9.5v5M15 9.5v5"/></svg>',
  arrowL:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M14 6l-6 6 6 6"/></svg>',
  arrowR:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M10 6l6 6-6 6"/></svg>',
};

// ——— State ———
const state = {
  projects: [],
  brand: [],
  groupBuy: [],
  prefs: loadPrefs(),
  popover: null,
  masterMonth: null,
};

function loadPrefs() {
  try { return Object.assign({ groupBy:'status', sort:'updated', q:'', statuses:['active','waiting','hold'] }, JSON.parse(localStorage.getItem(PREFS_KEY) || '{}')); }
  catch { return { groupBy:'status', sort:'updated', q:'', statuses:['active','waiting','hold'] }; }
}
function savePrefs() { localStorage.setItem(PREFS_KEY, JSON.stringify(state.prefs)); }

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

// ——— Fetch with sessionStorage cache ———
async function fetchPublic(path, useCache = true) {
  if (useCache) {
    try {
      const cache = JSON.parse(sessionStorage.getItem(MD_CACHE_KEY) || '{}');
      if (cache[path]) return cache[path];
    } catch {}
  }
  const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}?ref=${BRANCH}`, {
    headers: { 'Accept': 'application/vnd.github.v3+json' }
  });
  if (res.status === 403) {
    const reset = res.headers.get('x-ratelimit-reset');
    const wait = reset ? Math.ceil((parseInt(reset) * 1000 - Date.now()) / 60000) : '?';
    throw new Error(`API 流量限制，請約 ${wait} 分鐘後重試`);
  }
  if (!res.ok) throw new Error(`GitHub API 錯誤 (${res.status})`);
  const data = await res.json();
  if (useCache) {
    try {
      const cache = JSON.parse(sessionStorage.getItem(MD_CACHE_KEY) || '{}');
      cache[path] = data;
      sessionStorage.setItem(MD_CACHE_KEY, JSON.stringify(cache));
    } catch {}
  }
  return data;
}

function decodeMd(data) {
  return decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
}

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ——— Date utilities ———
function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
function fmtMD(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
const WEEKDAYS = ['日','一','二','三','四','五','六'];

// ——— Date extraction ———
// Returns: [{ date, endDate?, type, source, text, time?, raw }]
// types: start | todo | done | log | note | campaign
function extractDates(md, projectName) {
  const events = [];
  const seen = new Set();
  const lines = md.split('\n');
  let section = '';
  const today = startOfDay(new Date());
  const thisYear = today.getFullYear();

  function pushEvent(dateStr, type, source, text, opts={}) {
    const k = `${dateStr}|${type}|${text.slice(0, 30)}`;
    if (seen.has(k)) return;
    seen.add(k);
    events.push({ date: new Date(dateStr), type, source, text, raw: opts.raw, time: opts.time, endDate: opts.endDate });
  }

  function tryISO(s, type, source, sourceText, opts={}) {
    const r = /\b(\d{4})-(\d{1,2})-(\d{1,2})\b/g;
    let m;
    while ((m = r.exec(s))) {
      const y = +m[1], mo = +m[2], d = +m[3];
      if (y < 2020 || y > 2035 || mo < 1 || mo > 12 || d < 1 || d > 31) continue;
      const iso = `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      // detect time range after the date
      let time = null;
      const tail = s.slice(m.index + m[0].length, m.index + m[0].length + 30);
      const tm = tail.match(/(\d{1,2}):(\d{2})\s*[~–\-至]?\s*(\d{1,2}:\d{2})?/);
      if (tm) time = tm[0].trim();
      pushEvent(iso, type, source, sourceText, { raw: m[0], time, ...opts });
    }
  }

  function tryRange(s, source, sourceText) {
    // 2026-05 中 ~ 2026-07 中  /  2026-05 ~ 2026-07
    const r = /(\d{4})-(\d{1,2})\s*(?:月)?\s*(?:中|初|底)?\s*[~～\-–至]\s*(\d{4})-(\d{1,2})/g;
    let m;
    while ((m = r.exec(s))) {
      const y1=+m[1], mo1=+m[2], y2=+m[3], mo2=+m[4];
      if (y1 < 2020 || y2 > 2035) continue;
      const start = `${y1}-${String(mo1).padStart(2,'0')}-15`;
      const end   = `${y2}-${String(mo2).padStart(2,'0')}-15`;
      pushEvent(start, 'campaign', source, sourceText, { raw: m[0], endDate: new Date(end) });
    }
  }

  function tryCN(s, type, source, sourceText) {
    const r = /(\d{4})\s*年\s*(\d{1,2})\s*月\s*(\d{1,2})\s*日?/g;
    let m;
    while ((m = r.exec(s))) {
      const y=+m[1], mo=+m[2], d=+m[3];
      if (y < 2020 || y > 2035) continue;
      const iso = `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      pushEvent(iso, type, source, sourceText, { raw: m[0] });
    }
  }

  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (!line) continue;
    if (line.startsWith('## ')) { section = line.replace(/^##+\s*/, ''); continue; }
    if (line.startsWith('### ')) { continue; }

    const isMeta = line.startsWith('> ');
    if (isMeta) {
      // Only specific meta keys yield dates
      if (line.startsWith('> 開始日期：')) {
        tryISO(line, 'start', '開始日期', '開始：' + line.replace('> 開始日期：','').trim());
      }
      // Skip other > lines (avoid 報價/已開發票/分潤誤判)
      continue;
    }

    let type = 'note';
    if (section.includes('待辦')) {
      const checked = /^- \[x\]/i.test(line);
      type = checked ? 'done' : 'todo';
    } else if (section.includes('進度')) {
      type = 'log';
    } else if (section.includes('最新') || section.includes('備註') || section === '') {
      type = 'note';
    }

    // The displayed source text for the event: strip checkbox markers
    const display = line.replace(/^- \[[ x]\]\s*/i, '').replace(/^- /, '');

    tryISO(line, type, section || '備註', display);
    tryCN(line, type, section || '備註', display);
    tryRange(line, section || '備註', display);
  }

  // Filter: drop way-out-of-range dates (extra safety)
  return events.filter(e => {
    const y = e.date.getFullYear();
    return y >= 2020 && y <= 2035 && !isNaN(e.date.getTime());
  }).sort((a,b) => a.date - b.date);
}

// ——— Markdown parsing ———
function parseProject(md) {
  const lines = md.split('\n');
  const name = (lines.find(l => l.startsWith('# ')) || '# 未命名').replace('# ', '').trim();
  const meta = (key) => {
    const l = lines.find(l => l.startsWith(`> ${key}：`));
    return l ? l.replace(`> ${key}：`, '').trim() : '';
  };
  const status = meta('狀態');
  const contact = meta('窗口');
  const client = meta('客戶');
  const quoteRaw = meta('報價');
  const invoicedRaw = meta('已開發票');
  const splitRaw = meta('分潤');
  const startDateRaw = meta('開始日期');

  const parseAmount = s => { const m = s.replace(/,/g,'').match(/(\d+)/); return m ? parseInt(m[1]) : 0; };
  const quoteAmount = parseAmount(quoteRaw);
  const invoicedAmount = parseAmount(invoicedRaw);
  const splits = splitRaw ? splitRaw.split('、').map(s => s.trim()).filter(Boolean) : [];

  // Todos & last log
  let inTodo = false, inLog = false;
  const todos = [], logs = [];
  for (const line of lines) {
    if (line.startsWith('## 待辦')) { inTodo = true; inLog = false; continue; }
    if (line.startsWith('## 進度')) { inTodo = false; inLog = true; continue; }
    if (line.startsWith('## ')) { inTodo = false; inLog = false; continue; }
    if (inTodo) {
      const m = line.match(/^- \[([ x])\] (.+)/i);
      if (m) todos.push({ checked: m[1].toLowerCase() === 'x', text: m[2] });
    }
    if (inLog) {
      const m = line.match(/^- (.+)/);
      if (m) logs.push(m[1]);
    }
  }
  const openTodos = todos.filter(t => !t.checked).slice(0, 2);
  const lastLog = logs.length > 0 ? logs[logs.length - 1] : '';
  const events = extractDates(md, name);
  // Last meaningful update = max log date or start date
  let lastUpdate = null;
  for (const e of events) { if (e.type === 'log' || e.type === 'done') lastUpdate = e.date; }

  return {
    kind: 'project',
    chip: 'PROJECT',
    chipClass: '',
    name, status, contact, client,
    quoteRaw, quoteAmount, invoicedAmount, splits,
    startDateRaw,
    openTodos, allTodos: todos, lastLog,
    events,
    lastUpdate,
  };
}

function parseBrandCollab(md, type) {
  const sections = md.split(/^## /m).slice(1);
  return sections.map(sec => {
    const lines = sec.split('\n');
    const name = lines[0].trim();
    const body = lines.slice(1).join('\n');
    const meta = (key) => {
      const l = lines.find(l => l.startsWith(`> ${key}：`));
      return l ? l.replace(`> ${key}：`, '').trim() : '';
    };
    const status = meta('狀態');
    const contact = meta('窗口');
    const fee = meta('費用');
    const bullets = lines.filter(l => l.match(/^- /)).map(l => l.replace(/^- /, ''));
    const events = extractDates('## ' + sec, name);
    return {
      kind: 'brand',
      brandType: type, // '業配' | 'Reels'
      chip: type === '業配' ? 'BRAND · 業配' : 'BRAND · REELS',
      chipClass: type === '業配' ? 'is-brand-promo' : 'is-brand-reels',
      name, status, contact, fee,
      bullets,
      openTodos: bullets.slice(0, 2).map(b => ({ checked: false, text: b })),
      lastLog: bullets.length > 0 ? bullets[bullets.length - 1] : '',
      events,
      lastUpdate: events.length ? events[events.length - 1].date : null,
    };
  }).filter(item => item.name);
}

function parseGroupBuy(md) {
  const sections = md.split(/^## /m).slice(1);
  const items = [];
  for (const sec of sections) {
    const lines = sec.split('\n');
    const sectionName = lines[0].trim(); // 進行中 / 已結束
    if (!sectionName.includes('進行中')) continue;
    for (const l of lines) {
      const m = l.match(/^- (.+)/);
      if (m) {
        const text = m[1];
        // Try parse "品牌：狀態"
        const colon = text.match(/^([^：:]+)[：:](.+)$/);
        const itemName = colon ? colon[1].trim() : text;
        const itemDesc = colon ? colon[2].trim() : '';
        items.push({
          kind: 'brand',
          brandType: '團購',
          chip: 'BRAND · 團購',
          chipClass: 'is-brand-group',
          name: itemName,
          status: '進行中',
          contact: '',
          fee: '',
          bullets: itemDesc ? [itemDesc] : [],
          openTodos: itemDesc ? [{ checked: false, text: itemDesc }] : [],
          lastLog: itemDesc,
          events: extractDates('## ' + sec, itemName).filter(e => e.text.includes(itemName) || e.text.includes(itemDesc.slice(0,8))),
          lastUpdate: null,
        });
      }
    }
  }
  return items;
}

// ——— Card rendering ———
function statusBucket(status) {
  if (!status) return 'active';
  if (status.includes('完成') || status.includes('結束')) return 'done';
  if (status.includes('考慮')) return 'hold';
  if (status.includes('等待')) return 'waiting';
  return 'active';
}

function renderCard(item, idx) {
  const bucket = statusBucket(item.status);
  const cardClasses = ['card', 'has-footer'];
  if (bucket === 'waiting') cardClasses.push('is-waiting');
  if (bucket === 'done') cardClasses.push('is-done');

  const pauseIcon = bucket === 'waiting' ? `<span class="pause-icon">${I.pause}</span>` : '';
  const chipHtml = `<span class="card-chip ${item.chipClass}">${escapeHtml(item.chip)}</span>`;
  const contactHtml = item.contact ? `<span class="card-contact">${escapeHtml(item.contact)}</span>` : '';

  // Status row meta (start date · last update)
  const metaPieces = [];
  if (item.startDateRaw) metaPieces.push(`${item.startDateRaw} 開始`);
  if (item.lastUpdate) metaPieces.push(`更新於 ${item.lastUpdate.getMonth()+1}/${item.lastUpdate.getDate()}`);
  const metaText = metaPieces.length ? `<span class="card-meta-text">${metaPieces.join(' · ')}</span>` : '';

  // Body: open todos > last log > bullets fallback
  let bodyHtml = '';
  if (item.openTodos && item.openTodos.length > 0) {
    bodyHtml = item.openTodos.map(t => `
      <div class="card-todo ${t.checked?'done':''}">
        <div class="marker"></div>
        <span>${formatDates(escapeHtml(t.text))}</span>
      </div>`).join('');
  } else if (item.lastLog) {
    bodyHtml = `<div class="card-last-log"><span class="label">最後</span>${formatDates(escapeHtml(item.lastLog))}</div>`;
  } else {
    bodyHtml = `<div class="card-body-empty">（無待辦或紀錄）</div>`;
  }

  // Footer: pricing / fee / splits
  const fmt = n => n.toLocaleString('zh-TW');
  let footerInner = '';
  if (item.kind === 'project') {
    const q = item.quoteRaw;
    if (q && q !== '未報價' && q !== '未成案' && item.quoteAmount > 0) {
      const pct = Math.round((item.invoicedAmount / item.quoteAmount) * 100);
      footerInner += `<div class="card-price-row">
        <div><span class="card-price">${fmt(item.quoteAmount)}</span><span class="unit">未稅</span></div>
        ${item.invoicedAmount > 0 ? `<span class="card-invoiced">已開 ${fmt(item.invoicedAmount)}</span>` : ''}
      </div>`;
      if (item.invoicedAmount > 0) {
        footerInner += `<div class="progress-bar"><div style="width:${pct}%"></div></div>
          <div class="progress-labels"><span>已收 ${pct}%</span><span>尾款 ${fmt(item.quoteAmount - item.invoicedAmount)}</span></div>`;
      }
      if (item.splits.length > 0) {
        footerInner += `<div class="splits-row">${item.splits.map(s=>`<span class="split-tag">${escapeHtml(s)}</span>`).join('')}</div>`;
      }
    } else if (q) {
      footerInner += `<span class="card-price na">${escapeHtml(q)}</span>`;
    }
  } else if (item.kind === 'brand') {
    if (item.fee) {
      footerInner += `<div class="fee-line">${escapeHtml(item.fee)}</div>`;
    }
  }
  const footerHtml = footerInner ? `<div class="card-footer">${footerInner}</div>` : '';

  // Calendar button (only if there are events)
  const calBtn = item.events.length > 0
    ? `<button class="card-cal-btn" data-cardid="card-${idx}" title="${item.events.length} 個日期" onclick="openCardCal(event, ${idx})">${I.calendar}</button>`
    : '';

  return `<div class="${cardClasses.join(' ')}" id="card-${idx}" data-bucket="${bucket}" data-kind="${item.kind}-${item.brandType||''}">
    <div class="card-meta">${chipHtml}${contactHtml}</div>
    <div class="card-title">${escapeHtml(item.name)}${pauseIcon}</div>
    <div class="card-status-row">
      <span class="status-pill is-${bucket}">${escapeHtml(item.status || '進行中')}</span>
      ${metaText}
    </div>
    <hr class="hairline">
    <div class="card-body">${bodyHtml}</div>
    ${footerHtml ? '<hr class="hairline">' + footerHtml : ''}
    ${calBtn}
  </div>`;
}

// ——— Format dates inline ———
function formatDates(text) {
  const today = startOfDay(new Date());
  let result = text.replace(/(\d{4})-(\d{1,2})-(\d{1,2})/g, (match, y, m, d) => {
    const target = startOfDay(new Date(+y, +m - 1, +d));
    const diff = Math.round((target - today) / 86400000);
    const wd = WEEKDAYS[target.getDay()];
    const short = `${+m}/${+d}`;
    let label, cls;
    if (diff === 0) { label = `${short}(${wd}) 今天`; cls = 'today'; }
    else if (diff === 1) { label = `${short}(${wd}) 明天`; cls = 'tomorrow'; }
    else if (diff === -1) { label = `${short}(${wd}) 昨天`; cls = 'past'; }
    else if (diff < 0) { label = `${short}(${wd})`; cls = 'past'; }
    else if (diff < 7) { label = `${short} 本週${wd}`; cls = ''; }
    else if (diff < 14) { label = `${short} 下週${wd}`; cls = ''; }
    else { label = `${short}(${wd})`; cls = ''; }
    return `<span class="date-tag ${cls}">${label}</span>`;
  });
  result = result.replace(/（([^）]+)）/g, '<span class="annotation">（$1）</span>');
  return result;
}

// ——— Filter / sort / group ———
function getFilteredItems() {
  const all = [...state.projects, ...state.brand, ...state.groupBuy];
  const q = state.prefs.q.trim().toLowerCase();
  const allowedBuckets = state.prefs.statuses;
  return all.filter(it => {
    const b = statusBucket(it.status);
    if (!allowedBuckets.includes(b)) return false;
    if (!q) return true;
    const hay = [it.name, it.contact, it.client, it.lastLog, ...(it.openTodos||[]).map(t=>t.text), ...(it.bullets||[])].join(' ').toLowerCase();
    return hay.includes(q);
  });
}

function sortItems(items) {
  const s = state.prefs.sort;
  const arr = [...items];
  if (s === 'updated') {
    arr.sort((a,b) => (b.lastUpdate?.getTime()||0) - (a.lastUpdate?.getTime()||0));
  } else if (s === 'amount') {
    arr.sort((a,b) => (b.quoteAmount||0) - (a.quoteAmount||0));
  } else if (s === 'start') {
    arr.sort((a,b) => {
      const da = a.startDateRaw ? new Date(a.startDateRaw).getTime() : 0;
      const db = b.startDateRaw ? new Date(b.startDateRaw).getTime() : 0;
      return db - da;
    });
  } else if (s === 'name') {
    arr.sort((a,b) => a.name.localeCompare(b.name, 'zh-Hant'));
  }
  return arr;
}

function groupItems(items) {
  const g = state.prefs.groupBy;
  if (g === 'none') return [{ key: '全部', items }];
  if (g === 'status') {
    const order = [['active','進行中'],['waiting','等待中'],['hold','考慮中'],['done','已完成']];
    return order.map(([key,label]) => ({ key: label, items: items.filter(it => statusBucket(it.status) === key) }))
      .filter(g => g.items.length > 0);
  }
  if (g === 'kind') {
    const order = [
      ['project','工作室專案', it => it.kind === 'project'],
      ['promo','業配', it => it.brandType === '業配'],
      ['reels','Reels', it => it.brandType === 'Reels'],
      ['group','團購 & 公關品', it => it.brandType === '團購'],
    ];
    return order.map(([k, label, fn]) => ({ key: label, items: items.filter(fn) }))
      .filter(g => g.items.length > 0);
  }
  return [{ key: '全部', items }];
}

// ——— Render dashboard body ———
function renderBody() {
  const filtered = getFilteredItems();
  const sorted = sortItems(filtered);
  const groups = groupItems(sorted);
  const container = document.getElementById('cardsArea');
  if (!container) return;

  if (groups.length === 0) {
    container.innerHTML = `<div class="card-body-empty" style="padding:48px;text-align:center;">（沒有符合條件的項目）</div>`;
    return;
  }

  let html = '';
  let idx = 0;
  for (const g of groups) {
    html += `<div class="group-section">
      <div class="group-header"><h2>${escapeHtml(g.key)}</h2><span class="count">${g.items.length}</span></div>
      <div class="cards-grid">${g.items.map(it => renderCard(it, idx++)).join('')}</div>
    </div>`;
  }
  container.innerHTML = html;

  // Update chip counts
  const counts = { active:0, waiting:0, done:0, hold:0 };
  for (const it of [...state.projects, ...state.brand, ...state.groupBuy]) {
    counts[statusBucket(it.status)]++;
  }
  for (const k of Object.keys(counts)) {
    const el = document.querySelector(`.chip-toggle[data-status="${k}"] .count`);
    if (el) el.textContent = counts[k];
  }
}

// ——— Toolbar wiring ———
function renderToolbar() {
  const p = state.prefs;
  const groupOpts = [['status','依狀態'],['kind','依類型'],['none','不分組']];
  const sortOpts = [['updated','最近更新'],['start','開始日期'],['amount','金額大→小'],['name','名稱排序']];
  const statusList = [['active','進行中'],['waiting','等待'],['hold','考慮'],['done','完成']];
  return `<div class="toolbar">
    <div class="toolbar-inner">
      <div class="seg" role="tablist" aria-label="分組">
        ${groupOpts.map(([k,l]) => `<button class="${p.groupBy===k?'on':''}" onclick="setPref('groupBy','${k}')">${l}</button>`).join('')}
      </div>
      <div class="toolbar-spacer"></div>
      <select class="sort-select" onchange="setPref('sort', this.value)">
        ${sortOpts.map(([k,l]) => `<option value="${k}" ${p.sort===k?'selected':''}>${l}</option>`).join('')}
      </select>
      <button class="icon-btn" onclick="openMasterCal()" title="總表月曆">${I.calendar}</button>
      <button class="icon-btn ghost" onclick="hardRefresh()" title="重新整理">${I.refresh}</button>
      <div class="chips-row">
        ${statusList.map(([k,l]) => `<button class="chip-toggle ${p.statuses.includes(k)?'on':''}" data-status="${k}" onclick="toggleStatus('${k}')"><span class="dot"></span>${l}<span class="count">0</span></button>`).join('')}
      </div>
    </div>
  </div>`;
}

window.setPref = function(key, val) {
  state.prefs[key] = val;
  savePrefs();
  if (key === 'q' || key === 'sort' || key === 'groupBy') renderBody();
  if (key === 'groupBy' || key === 'sort') {
    document.querySelectorAll('.toolbar .seg').forEach(seg => {
      seg.querySelectorAll('button').forEach(b => b.classList.remove('on'));
    });
    document.querySelectorAll('.toolbar .seg button').forEach(b => {
      const txt = b.textContent.trim();
      if (state.prefs.groupBy === 'status' && txt === '依狀態') b.classList.add('on');
      if (state.prefs.groupBy === 'kind' && txt === '依類型') b.classList.add('on');
      if (state.prefs.groupBy === 'none' && txt === '不分組') b.classList.add('on');
    });
  }
};

window.toggleStatus = function(k) {
  const arr = state.prefs.statuses;
  const idx = arr.indexOf(k);
  if (idx >= 0) arr.splice(idx, 1); else arr.push(k);
  savePrefs();
  document.querySelector(`.chip-toggle[data-status="${k}"]`).classList.toggle('on');
  renderBody();
};

window.hardRefresh = function() {
  sessionStorage.removeItem(MD_CACHE_KEY);
  loadAll();
};

// ——— Card calendar popover ———
window.openCardCal = function(ev, idx) {
  ev.stopPropagation();
  closePopover();
  const card = document.getElementById(`card-${idx}`);
  const all = [...state.projects, ...state.brand, ...state.groupBuy];
  // find the item matching this card index by re-running grouping
  const filtered = getFilteredItems();
  const sorted = sortItems(filtered);
  const groups = groupItems(sorted);
  let cnt = 0, item = null;
  for (const g of groups) for (const it of g.items) { if (cnt === idx) { item = it; break; } cnt++; if (item) break; }
  if (!item) return;

  const pop = document.createElement('div');
  pop.className = 'cal-popover';
  pop.dataset.month = formatYM(new Date());
  pop.innerHTML = renderPopoverContent(item, new Date());
  document.body.appendChild(pop);
  positionPopover(pop, ev.currentTarget);
  state.popover = { el: pop, item };
  setTimeout(() => document.addEventListener('click', popoverOutsideClose, { once: true }), 0);
};

function popoverOutsideClose(ev) {
  if (state.popover && !state.popover.el.contains(ev.target)) closePopover();
}

function closePopover() {
  if (state.popover) {
    state.popover.el.remove();
    state.popover = null;
  }
}

function positionPopover(pop, anchor) {
  const isMobile = window.innerWidth < 640;
  if (isMobile) return; // mobile uses fixed bottom-sheet via CSS
  const r = anchor.getBoundingClientRect();
  const popW = 320;
  let left = r.right + window.scrollX - popW;
  if (left < 12) left = 12;
  let top = r.top + window.scrollY - 8 - 380;
  if (top < window.scrollY + 70) top = r.bottom + window.scrollY + 8;
  pop.style.left = left + 'px';
  pop.style.top = top + 'px';
}

function formatYM(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }

function renderPopoverContent(item, monthDate) {
  return `
    <div class="cal-popover-title">${escapeHtml(item.name)}</div>
    <div class="cal-nav">
      <button onclick="popMonth(-1)">${I.arrowL}</button>
      <span>${monthDate.getFullYear()} 年 ${monthDate.getMonth()+1} 月</span>
      <button onclick="popMonth(1)">${I.arrowR}</button>
    </div>
    ${renderMiniGrid(monthDate, item.events)}
    ${renderEventsList(item.events, monthDate)}
  `;
}

window.popMonth = function(delta) {
  if (!state.popover) return;
  const [y,m] = state.popover.el.dataset.month.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  state.popover.el.dataset.month = formatYM(d);
  state.popover.el.innerHTML = renderPopoverContent(state.popover.item, d);
};

function renderMiniGrid(monthDate, events) {
  const y = monthDate.getFullYear(), m = monthDate.getMonth();
  const first = new Date(y, m, 1);
  const startDow = first.getDay();
  const lastDay = new Date(y, m+1, 0).getDate();
  const today = startOfDay(new Date());
  const eventsByDay = {};
  for (const e of events) {
    if (e.date.getFullYear() === y && e.date.getMonth() === m) {
      const d = e.date.getDate();
      eventsByDay[d] = (eventsByDay[d] || 0) + 1;
    }
    if (e.endDate && e.date.getFullYear() <= y && e.endDate.getFullYear() >= y) {
      // mark range cells
      const s = (e.date.getFullYear() === y && e.date.getMonth() === m) ? e.date.getDate() : 1;
      const eEnd = (e.endDate.getFullYear() === y && e.endDate.getMonth() === m) ? e.endDate.getDate() : lastDay;
      for (let d = s; d <= eEnd; d++) {
        eventsByDay[d] = eventsByDay[d] || -1; // -1 means range only
      }
    }
  }
  let cells = '';
  for (const wd of WEEKDAYS) cells += `<div class="wd">${wd}</div>`;
  for (let i = 0; i < startDow; i++) cells += `<div class="cal-cell other"></div>`;
  for (let d = 1; d <= lastDay; d++) {
    const dt = new Date(y, m, d);
    const isToday = dt.getTime() === today.getTime();
    const cnt = eventsByDay[d];
    let cls = 'cal-cell';
    if (isToday) cls += ' today';
    if (cnt > 0) cls += ' has-event';
    else if (cnt === -1) cls += ' in-range';
    cells += `<div class="${cls}">${d}</div>`;
  }
  return `<div class="cal-grid">${cells}</div>`;
}

function renderEventsList(events, monthDate) {
  const y = monthDate.getFullYear(), m = monthDate.getMonth();
  const inMonth = events.filter(e => e.date.getFullYear() === y && e.date.getMonth() === m);
  if (inMonth.length === 0) return `<div class="cal-events"><div class="card-body-empty">（本月無事件）</div></div>`;
  return `<div class="cal-events">${inMonth.map(e => `
    <div class="cal-event-row">
      <span class="d">${fmtMD(e.date)}</span>
      ${e.time ? `<span class="t">${escapeHtml(e.time)}</span>` : ''}
      <span>${escapeHtml(e.text.slice(0, 80))}</span>
    </div>`).join('')}</div>`;
}

// ——— Master calendar modal ———
function getAllEvents() {
  const all = [...state.projects, ...state.brand, ...state.groupBuy];
  const out = [];
  for (const it of all) {
    for (const e of it.events) {
      out.push(Object.assign({}, e, { project: it }));
    }
  }
  return out;
}

window.openMasterCal = function() {
  const modal = document.getElementById('masterModal');
  state.masterMonth = state.masterMonth || new Date();
  modal.innerHTML = renderMasterModal(state.masterMonth);
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
};

window.closeMasterCal = function() {
  const modal = document.getElementById('masterModal');
  modal.classList.remove('open');
  document.body.style.overflow = '';
};

window.masterMonth = function(delta) {
  const d = new Date(state.masterMonth);
  d.setMonth(d.getMonth() + delta);
  state.masterMonth = d;
  document.getElementById('masterModal').innerHTML = renderMasterModal(d);
};

function brandClass(item) {
  if (item.kind === 'project') return '';
  if (item.brandType === '業配') return 'brand-promo';
  if (item.brandType === 'Reels') return 'brand-reels';
  if (item.brandType === '團購') return 'brand-group';
  return '';
}

function renderMasterModal(monthDate) {
  const events = getAllEvents();
  const y = monthDate.getFullYear(), m = monthDate.getMonth();
  const first = new Date(y, m, 1);
  const startDow = first.getDay();
  const lastDay = new Date(y, m+1, 0).getDate();
  const today = startOfDay(new Date());

  // events by day
  const byDay = {};
  for (const e of events) {
    const sameMonth = e.date.getFullYear() === y && e.date.getMonth() === m;
    if (sameMonth) {
      const d = e.date.getDate();
      (byDay[d] = byDay[d] || []).push(e);
    }
    if (e.endDate) {
      const inMonth = (dy, dm) => (dy === y && dm === m);
      const sStart = inMonth(e.date.getFullYear(), e.date.getMonth()) ? e.date.getDate() : 1;
      const eEnd = inMonth(e.endDate.getFullYear(), e.endDate.getMonth()) ? e.endDate.getDate() : lastDay;
      const startBeforeMonth = (e.date < first);
      const endAfterMonth = (e.endDate > new Date(y, m+1, 0));
      if (startBeforeMonth || endAfterMonth || e.date.getMonth() === m) {
        for (let d = sStart; d <= eEnd; d++) {
          const exists = (byDay[d] || []).some(x => x === e);
          if (!exists) (byDay[d] = byDay[d] || []).push(e);
        }
      }
    }
  }

  // Build grid cells
  let gridCells = '';
  for (const wd of WEEKDAYS) gridCells += `<div class="wd">${wd}</div>`;
  for (let i = 0; i < startDow; i++) gridCells += `<div class="mc-cell other"></div>`;
  for (let d = 1; d <= lastDay; d++) {
    const dt = new Date(y, m, d);
    const isToday = dt.getTime() === today.getTime();
    const evs = byDay[d] || [];
    const visible = evs.slice(0, 3);
    const more = evs.length - visible.length;
    gridCells += `<div class="mc-cell ${isToday?'today':''}" onclick="masterPickDay(${y},${m},${d})">
      <div class="day-num">${d}</div>
      ${visible.map(e => {
        const cls = brandClass(e.project);
        const isRange = !!e.endDate;
        const label = `${e.project.name} · ${e.text}`;
        return `<div class="mc-event ${cls} ${isRange?'range':''}" title="${escapeHtml(label)}" onclick="event.stopPropagation(); jumpToCard('${escapeHtml(e.project.name)}')">${escapeHtml(e.project.name)}</div>`;
      }).join('')}
      ${more > 0 ? `<div class="mc-more">+${more} 更多</div>` : ''}
    </div>`;
  }

  // Build right side list (default: all events in month)
  const monthEvents = [];
  for (const d of Object.keys(byDay).map(Number).sort((a,b)=>a-b)) {
    for (const e of byDay[d]) monthEvents.push({ d, e });
  }
  const listHtml = monthEvents.length === 0
    ? `<div class="card-body-empty">（本月無事件）</div>`
    : monthEvents.map(({d, e}) => `
        <div class="mc-list-row" onclick="closeMasterCal(); jumpToCard('${escapeHtml(e.project.name)}')">
          <div class="when">${m+1}/${d}${e.time ? ' · ' + escapeHtml(e.time) : ''}</div>
          <div class="what">${escapeHtml(e.text.slice(0, 100))}</div>
          <div class="who">${escapeHtml(e.project.name)} · ${escapeHtml(e.project.chip)}</div>
        </div>`).join('');

  return `
    <div class="modal-card" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2>${I.calendar}<span>總表月曆</span></h2>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="modal-close" onclick="masterMonth(-1)">‹</button>
          <span style="font-weight:800;font-size:0.95em;min-width:120px;text-align:center;">${y} 年 ${m+1} 月</span>
          <button class="modal-close" onclick="masterMonth(1)">›</button>
          <button class="modal-close" onclick="closeMasterCal()" style="margin-left:6px;">✕</button>
        </div>
      </div>
      <div class="modal-body">
        <div class="modal-cal-pane">
          <div class="mc-grid">${gridCells}</div>
        </div>
        <div class="modal-side">
          <h3>本月事件 (${monthEvents.length})</h3>
          <div class="mc-list">${listHtml}</div>
        </div>
      </div>
    </div>
  `;
}

window.masterPickDay = function(y, m, d) {
  // Re-render side list with only that day's events
  const events = getAllEvents().filter(e => {
    const inSingle = e.date.getFullYear() === y && e.date.getMonth() === m && e.date.getDate() === d;
    const inRange = e.endDate && e.date <= new Date(y,m,d) && e.endDate >= new Date(y,m,d);
    return inSingle || inRange;
  });
  const side = document.querySelector('#masterModal .modal-side');
  if (!side) return;
  side.innerHTML = `<h3>${y}/${m+1}/${d} 事件 (${events.length})</h3><div class="mc-list">${
    events.length === 0
      ? '<div class="card-body-empty">（這天沒事）</div>'
      : events.map(e => `
        <div class="mc-list-row" onclick="closeMasterCal(); jumpToCard('${escapeHtml(e.project.name)}')">
          <div class="when">${m+1}/${d}${e.time ? ' · ' + escapeHtml(e.time) : ''}</div>
          <div class="what">${escapeHtml(e.text.slice(0, 100))}</div>
          <div class="who">${escapeHtml(e.project.name)} · ${escapeHtml(e.project.chip)}</div>
        </div>`).join('')
  }</div>`;
};

window.jumpToCard = function(projectName) {
  // Find card by data; need to compare by item name → re-search rendered cards
  const cards = document.querySelectorAll('.card');
  for (const c of cards) {
    const titleEl = c.querySelector('.card-title');
    if (titleEl && titleEl.textContent.trim().startsWith(projectName)) {
      c.scrollIntoView({ behavior: 'smooth', block: 'center' });
      c.classList.remove('flash');
      void c.offsetWidth;
      c.classList.add('flash');
      setTimeout(() => c.classList.remove('flash'), 1800);
      return;
    }
  }
};

// ——— Loaders ———
async function loadProjects() {
  try {
    const files = await fetchPublic('Projects');
    if (!Array.isArray(files)) return [];
    const mdFiles = files.filter(f => f.name.endsWith('.md'));
    const items = await Promise.all(mdFiles.map(async f => {
      const data = await fetchPublic(`Projects/${encodeURIComponent(f.name)}`);
      return parseProject(decodeMd(data));
    }));
    return items;
  } catch (e) {
    showToast(e.message, true);
    return [];
  }
}

async function loadBrand() {
  const brandFiles = [
    { path: 'Brand/%E5%BC%B7%E5%BC%B7%E6%BB%BE%E4%B8%80%E5%AE%B6-%E6%A5%AD%E9%85%8D.md', type: '業配' },
    { path: 'Brand/%E5%BC%B7%E5%BC%B7%E6%BB%BE%E4%B8%80%E5%AE%B6-Reels.md', type: 'Reels' },
  ];
  const out = [];
  for (const f of brandFiles) {
    try {
      const data = await fetchPublic(f.path);
      out.push(...parseBrandCollab(decodeMd(data), f.type));
    } catch {}
  }
  return out;
}

async function loadGroupBuy() {
  try {
    const data = await fetchPublic('Brand/%E5%BC%B7%E5%BC%B7%E6%BB%BE%E4%B8%80%E5%AE%B6-%E5%9C%98%E8%B3%BC.md');
    return parseGroupBuy(decodeMd(data));
  } catch { return []; }
}

async function loadAll() {
  const cards = document.getElementById('cardsArea');
  if (cards) cards.innerHTML = `<div class="card-body-empty" style="padding:48px;text-align:center;">載入中…</div>`;
  const [projects, brand, groupBuy] = await Promise.all([loadProjects(), loadBrand(), loadGroupBuy()]);
  state.projects = projects;
  state.brand = brand;
  state.groupBuy = groupBuy;
  renderBody();
  updateLoadTime();
}

function updateLoadTime() {
  const now = new Date();
  const ts = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const el = document.getElementById('loadTime');
  if (el) el.textContent = `讀取時間：${ts}`;
}

function renderShell() {
  document.getElementById('app').innerHTML = `
    <div class="hero">
      <div class="hero-inner">
        <h1 class="hero-title">阿忠戰情表</h1>
        <div class="hero-time" id="loadTime"></div>
      </div>
    </div>
    ${renderToolbar()}
    <div class="main">
      <div id="cardsArea"></div>
    </div>
  `;
}

window.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closePopover();
    if (document.getElementById('masterModal').classList.contains('open')) closeMasterCal();
  }
});
window.addEventListener('scroll', closePopover, { passive: true });
window.addEventListener('resize', closePopover);

renderShell();
loadAll();
</script>
