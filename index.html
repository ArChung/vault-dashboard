<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>阿忠 Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400&family=Noto+Serif+TC:wght@300;400;600;900&display=swap');

  :root {
    /* —— Editorial Warm Palette —— */
    --paper:        #F7F2E9;   /* warm cream base */
    --paper-deep:   #EFE6D4;   /* darker cream */
    --paper-card:   #FBF7EE;   /* card surface (slightly lifted from paper) */
    --footer-bg:    #E8D9C0;   /* warm beige block for footer */
    --ink:          #2B2420;   /* warm charcoal, not black */
    --ink-soft:     #6B5D52;   /* warm taupe */
    --ink-mute:     #9B8E82;   /* dusty taupe */
    --thread:       #D4C4A8;   /* hairline if needed */
    --thread-soft:  #E5D9BE;

    /* —— Single Accent + Soft Complement —— */
    --accent:       #B94A2C;   /* burnt sienna, the only hot note */
    --accent-dark:  #8F3420;
    --accent-soft:  #DCA679;   /* soft caramel */
    --accent-tint:  #F3E2D3;   /* bg tint of accent */

    /* —— Status text colors (no pills) —— */
    --st-active: var(--ink);
    --st-wait:   var(--ink-soft);
    --st-hold:   var(--ink-soft);
    --st-done:   var(--ink-mute);

    /* —— Category (事件類型，月曆用) —— */
    --cat-project:    var(--ink);
    --cat-brand-promo:var(--accent);
    --cat-brand-reels:var(--accent-soft);
    --cat-brand-group:#B08968;

    /* —— Shadows (barely-there, warm) —— */
    --shadow-sm: 0 1px 2px rgba(43,36,32,0.04), 0 1px 1px rgba(43,36,32,0.05);
    --shadow-md: 0 8px 24px -12px rgba(43,36,32,0.16), 0 2px 4px rgba(43,36,32,0.04);
    --shadow-lg: 0 20px 44px -22px rgba(43,36,32,0.22);

    /* —— Radius (softer, more editorial) —— */
    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    font-family: 'Fraunces', 'Noto Serif TC', Georgia, serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.65;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "ss02";
  }

  /* —— Hero (cream paper, editorial masthead) —— */
  .hero {
    background: var(--paper);
    color: var(--ink);
    padding: 44px 32px 32px;
    position: relative;
  }
  .hero::after {
    content: '';
    position: absolute; left: 32px; right: 32px; bottom: 0;
    height: 1px;
    background: var(--thread);
    opacity: 0.6;
  }
  .hero-inner {
    max-width: 1280px;
    margin: 0 auto;
    position: relative;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 18px;
  }
  .hero-title {
    font-family: 'Fraunces', 'Noto Serif TC', Georgia, serif;
    font-weight: 600;
    font-variation-settings: "opsz" 144, "SOFT" 30;
    font-size: 3em;
    letter-spacing: -0.02em;
    color: var(--ink);
    line-height: 1;
  }
  .hero-title .serif-accent {
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
  }
  .hero-time {
    font-family: 'Fraunces', 'Noto Serif TC', Georgia, serif;
    font-style: italic;
    font-size: 0.9em;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
    font-weight: 400;
  }

  /* —— Toolbar (transparent, no divider) —— */
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 40;
    background: rgba(247,242,233,0.88);
    backdrop-filter: saturate(180%) blur(14px);
    -webkit-backdrop-filter: saturate(180%) blur(14px);
  }
  .toolbar-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 16px 32px;
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    align-items: center;
  }
  .seg {
    display: inline-flex;
    gap: 2px;
    background: transparent;
    padding: 0;
  }
  .seg button {
    border: 0;
    background: transparent;
    color: var(--ink-mute);
    font-family: inherit;
    font-weight: 400;
    font-size: 0.88em;
    font-style: italic;
    padding: 4px 10px;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: color 0.18s ease;
    position: relative;
  }
  .seg button:hover { color: var(--ink-soft); }
  .seg button.on {
    color: var(--accent);
    font-style: normal;
    font-weight: 600;
  }
  .seg button.on::after {
    content: '';
    position: absolute;
    left: 10px; right: 10px; bottom: -2px;
    height: 1px;
    background: var(--accent);
  }
  .toolbar-spacer { flex: 1; }
  .sort-select {
    border: 0;
    background: transparent;
    color: var(--ink-soft);
    font-family: inherit;
    font-size: 0.88em;
    font-style: italic;
    font-weight: 400;
    padding: 4px 8px 4px 0;
    cursor: pointer;
    letter-spacing: 0.01em;
  }
  .icon-btn {
    width: 36px; height: 36px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 999px;
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--thread);
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .icon-btn:hover { color: var(--accent); border-color: var(--accent); }
  .icon-btn.ghost {
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--thread);
  }
  .icon-btn svg { width: 16px; height: 16px; }

  .chips-row {
    width: 100%;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .chip-toggle {
    border: 0;
    background: transparent;
    color: var(--ink-mute);
    font-family: inherit;
    font-weight: 400;
    font-size: 0.85em;
    font-style: italic;
    padding: 3px 10px;
    cursor: pointer;
    letter-spacing: 0.01em;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: color 0.15s ease;
  }
  .chip-toggle .dot { display: none; }
  .chip-toggle:hover { color: var(--ink-soft); }
  .chip-toggle.on {
    color: var(--accent);
    font-style: normal;
    font-weight: 600;
  }
  .chip-toggle .count {
    font-size: 0.82em;
    font-weight: 400;
    color: var(--ink-mute);
    font-style: italic;
    margin-left: 2px;
  }
  .chip-toggle.on .count { color: var(--accent); opacity: 0.7; }

  /* —— Main —— */
  .main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 32px 32px 80px;
  }
  .cards-grid { grid-template-columns: 1fr; }
  @media (min-width: 720px) { .cards-grid { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 1120px) { .cards-grid { grid-template-columns: 1fr 1fr 1fr; } }
  .group-section + .group-section { margin-top: 48px; }
  .group-header {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin: 0 0 22px;
    padding-bottom: 0;
  }
  .group-header h2 {
    font-family: 'Fraunces', 'Noto Serif TC', Georgia, serif;
    font-weight: 400;
    font-style: italic;
    font-size: 1.1em;
    color: var(--ink-soft);
    letter-spacing: 0.01em;
  }
  .group-header .count {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 400;
    font-style: italic;
    color: var(--ink-mute);
    font-size: 0.92em;
  }

  .cards-grid {
    display: grid;
    gap: 22px;
  }

  /* —— Card v4 (editorial warm) —— */
  .card {
    position: relative;
    background: var(--paper-card);
    border: 0;
    border-radius: var(--r-md);
    padding: 30px 30px 18px;
    box-shadow: var(--shadow-sm);
    transition: transform 0.22s ease, box-shadow 0.22s ease;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 280px;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }
  .card.is-waiting { background: var(--paper-card); }
  .card.is-done { opacity: 0.6; }
  .card.flash {
    animation: flash-card 1.8s ease;
  }
  @keyframes flash-card {
    0%, 100% { box-shadow: var(--shadow-sm); }
    25%, 65% { box-shadow: 0 0 0 3px var(--accent-tint), var(--shadow-md); }
  }

  /* —— Card title & top-right meta —— */
  .card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: 18px;
  }
  .card-title {
    font-family: 'Fraunces', 'Noto Serif TC', Georgia, serif;
    font-variation-settings: "opsz" 144, "SOFT" 30;
    font-weight: 600;
    font-size: 1.4em;
    color: var(--ink);
    letter-spacing: -0.015em;
    line-height: 1.2;
    flex: 1;
    min-width: 0;
  }
  .card-title .pause-icon {
    color: var(--ink-mute);
    margin-right: 6px;
    display: inline-flex;
    align-items: center;
    transform: translateY(-2px);
  }
  .card-title .pause-icon svg { width: 13px; height: 13px; display: block; }
  .card-meta-tr {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    font-family: 'Fraunces', 'Noto Serif TC', Georgia, serif;
    font-style: italic;
    font-size: 0.8em;
    color: var(--ink-soft);
    font-weight: 400;
    letter-spacing: 0.01em;
    padding-top: 6px;
    white-space: nowrap;
  }
  .card-meta-tr .mt-contact { color: var(--ink-soft); }
  .card-meta-tr .mt-sep {
    color: var(--ink-mute);
    opacity: 0.5;
    font-style: normal;
  }
  .card-meta-tr .mt-status { color: var(--ink-soft); }
  .card-meta-tr .mt-status.mt-active { color: var(--accent); font-style: normal; font-weight: 600; }
  .card-meta-tr .mt-status.mt-waiting { color: var(--ink-soft); }
  .card-meta-tr .mt-status.mt-hold { color: var(--ink-mute); }
  .card-meta-tr .mt-status.mt-done { color: var(--ink-mute); text-decoration: line-through; }

  /* —— Card body (todos / last log, no bullet markers) —— */
  .card-body {
    flex: 1 0 auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }
  .card-body-empty {
    color: var(--ink-mute);
    font-size: 0.9em;
    font-style: italic;
    font-family: 'Fraunces', 'Noto Serif TC', Georgia, serif;
  }
  .card-todo {
    font-family: 'Fraunces', 'Noto Serif TC', Georgia, serif;
    font-size: 0.98em;
    line-height: 1.55;
    color: var(--ink);
    font-weight: 400;
  }
  .card-todo.done {
    color: var(--ink-mute);
    text-decoration: line-through;
    text-decoration-color: var(--ink-mute);
  }
  .card-last-log {
    font-family: 'Fraunces', 'Noto Serif TC', Georgia, serif;
    font-size: 0.9em;
    color: var(--ink-soft);
    line-height: 1.55;
    font-style: italic;
  }
  .card-last-log .label {
    display: inline;
    font-size: 0.85em;
    font-weight: 400;
    color: var(--accent);
    font-style: normal;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-right: 8px;
  }

  /* —— Card footer (warm color block) —— */
  .card-footer-warm {
    margin: 0 -30px;
    padding: 16px 30px 14px;
    background: var(--footer-bg);
    display: flex;
    flex-direction: column;
    gap: 6px;
    border-radius: 0;
    position: relative;
  }
  .card-money {
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 16px;
  }
  .card-price {
    font-family: 'Fraunces', 'Noto Serif TC', Georgia, serif;
    font-variation-settings: "opsz" 144;
    font-weight: 600;
    color: var(--ink);
    font-size: 1.5em;
    letter-spacing: -0.01em;
    line-height: 1;
  }
  .card-price .unit {
    font-family: 'Fraunces', 'Noto Serif TC', Georgia, serif;
    font-style: italic;
    font-weight: 400;
    font-size: 0.5em;
    color: var(--ink-soft);
    margin-left: 8px;
    letter-spacing: 0.02em;
    text-transform: none;
  }
  .card-price.na {
    font-family: 'Fraunces', 'Noto Serif TC', Georgia, serif;
    font-weight: 400;
    font-style: italic;
    color: var(--ink-soft);
    font-size: 0.95em;
  }
  .card-invoiced {
    font-family: 'Fraunces', 'Noto Serif TC', Georgia, serif;
    font-style: italic;
    font-size: 0.88em;
    color: var(--ink-soft);
    font-weight: 400;
    letter-spacing: 0.01em;
  }
  .card-splits-line {
    font-family: 'Fraunces', 'Noto Serif TC', Georgia, serif;
    font-style: italic;
    font-size: 0.82em;
    color: var(--ink-soft);
    letter-spacing: 0.01em;
    font-weight: 400;
    line-height: 1.4;
  }
  .fee-line {
    font-family: 'Fraunces', 'Noto Serif TC', Georgia, serif;
    font-weight: 600;
    font-size: 1.05em;
    color: var(--ink);
    letter-spacing: -0.005em;
    line-height: 1.5;
  }

  /* —— Card bottom meta: hover-only —— */
  .card-meta-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    padding: 0 2px;
    font-family: 'Fraunces', 'Noto Serif TC', Georgia, serif;
    font-style: italic;
    font-size: 0.78em;
    color: var(--ink-mute);
    font-weight: 400;
    letter-spacing: 0.01em;
    opacity: 0;
    transition: opacity 0.28s ease;
    min-height: 22px;
  }
  .card:hover .card-meta-bottom { opacity: 1; }
  .card-meta-bottom .meta-date { flex: 1; }
  .card-cal-btn {
    width: 24px;
    height: 24px;
    border-radius: 999px;
    background: transparent;
    color: var(--ink-mute);
    border: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: color 0.15s ease;
    flex-shrink: 0;
    padding: 0;
  }
  .card-cal-btn:hover { color: var(--accent); }
  .card-cal-btn svg { width: 13px; height: 13px; }
  /* On touch devices, always show the meta (no hover) */
  @media (hover: none) {
    .card-meta-bottom { opacity: 0.8; }
  }

  /* —— Date tags (inline) —— */
  .date-tag {
    display: inline-block;
    font-family: 'Fraunces', 'Noto Serif TC', Georgia, serif;
    font-weight: 500;
    font-size: 0.98em;
    color: var(--accent);
    letter-spacing: 0;
  }
  .date-tag.past { color: var(--ink-mute); font-weight: 400; font-style: italic; }
  .date-tag.today {
    color: var(--accent-dark);
    font-weight: 600;
    font-style: italic;
    border-bottom: 2px solid var(--accent);
    padding-bottom: 1px;
  }
  .date-tag.tomorrow {
    color: var(--accent);
    font-weight: 600;
  }
  .annotation { color: var(--ink-mute); font-style: italic; font-size: 0.94em; }

  /* —— Fullscreen calendar modal —— */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(43,36,32,0.28);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 200;
    display: none;
  }
  .modal-backdrop.open { display: block; }
  .modal-card {
    position: absolute;
    inset: 0;
    background: var(--paper);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .modal-header {
    padding: 18px 32px;
    border-bottom: 1px solid var(--thread);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    flex-wrap: wrap;
    background: var(--paper);
  }
  .modal-header-left {
    display: flex; align-items: center; gap: 14px;
  }
  .modal-header h2 {
    font-family: 'Fraunces', 'Noto Serif TC', Georgia, serif;
    font-weight: 600;
    font-size: 1.35em;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 12px;
    letter-spacing: -0.01em;
  }
  .modal-header h2 svg { width: 20px; height: 20px; color: var(--accent); }
  .modal-header .filter-label {
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    font-size: 0.88em;
    font-weight: 400;
    color: var(--accent);
    padding: 0;
    letter-spacing: 0.01em;
  }
  .modal-nav {
    display: flex; align-items: center; gap: 4px;
  }
  .modal-nav-btn {
    width: 34px; height: 34px;
    border-radius: 999px;
    border: 0;
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
    line-height: 1;
    transition: color 0.15s ease, background 0.15s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .modal-nav-btn:hover { background: var(--paper-deep); color: var(--accent); }
  .modal-nav-ym {
    font-family: 'Fraunces', 'Noto Serif TC', Georgia, serif;
    font-weight: 500;
    font-size: 1.05em;
    color: var(--ink);
    min-width: 104px;
    text-align: center;
    letter-spacing: 0;
  }
  .modal-today-btn {
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    font-size: 0.88em;
    font-weight: 400;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid var(--thread);
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
    letter-spacing: 0.01em;
  }
  .modal-today-btn:hover { border-color: var(--accent); color: var(--accent); }
  .modal-close-x {
    width: 34px; height: 34px;
    border-radius: 999px;
    border: 0;
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
    font-size: 1.15em;
    line-height: 1;
    margin-left: 4px;
  }
  .modal-close-x:hover { background: var(--paper-deep); color: var(--accent); }

  .modal-body {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 16px 26px 26px;
  }
  .mc-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-auto-rows: 1fr;
    gap: 1px;
    background: var(--thread-soft);
    border: 1px solid var(--thread-soft);
    border-radius: var(--r-sm);
    overflow: hidden;
    flex: 1;
    min-height: 0;
    font-size: 0.88em;
  }
  .mc-grid .wd {
    text-align: center;
    color: var(--ink-mute);
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    font-weight: 400;
    padding: 9px 0;
    font-size: 0.85em;
    letter-spacing: 0.04em;
    background: var(--paper-card);
  }
  .mc-grid .wd.weekend { color: var(--ink-mute); opacity: 0.7; }
  .mc-cell {
    background: var(--paper-card);
    min-height: 0;
    padding: 6px 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    cursor: pointer;
    transition: background 0.12s ease;
    overflow: hidden;
  }
  .mc-cell:hover { background: var(--paper-deep); }
  .mc-cell.other { background: var(--paper); }
  .mc-cell.other .day-num { color: var(--ink-mute); opacity: 0.5; }
  .mc-cell.weekend .day-num { color: var(--ink-mute); }
  .mc-cell .day-num {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    font-size: 0.9em;
    color: var(--ink);
    padding: 2px 4px;
    line-height: 1;
    align-self: flex-start;
  }
  .mc-cell.today .day-num {
    background: var(--accent);
    color: #fff;
    border-radius: 999px;
    padding: 4px 8px;
    font-weight: 600;
  }
  .mc-event {
    font-family: 'Fraunces', 'Noto Serif TC', Georgia, serif;
    font-size: 0.8em;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 3px;
    color: #fff;
    background: var(--accent);
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    cursor: pointer;
    letter-spacing: 0;
    line-height: 1.4;
  }
  .mc-event:hover { filter: brightness(1.08); }
  .mc-event.brand-promo { background: var(--accent); }
  .mc-event.brand-reels { background: var(--accent-soft); color: #3C2616; }
  .mc-event.brand-group { background: #B08968; color: #FBF7EE; }
  .mc-event.range {
    background: linear-gradient(90deg, var(--accent-soft) 0%, var(--accent) 100%);
  }
  .mc-more {
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    font-size: 0.78em;
    color: var(--ink-soft);
    font-weight: 400;

<body>

<div id="app"><div style="text-align:center;padding:80px;color:var(--ink-mute);">載入中...</div></div>
<div class="toast" id="toast"></div>
<div class="modal-backdrop" id="masterModal" onclick="if(event.target===this)closeMasterCal()"></div>

<script>
const OWNER = 'ArChung';
const REPO = 'vault-dashboard';
const BRANCH = 'master';
const MD_CACHE_KEY = 'archung-md-cache-v1';
const PREFS_KEY = 'archung-prefs-v2';

// ——— Icons ———
const I = {
  search:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>',
  calendar:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="17" rx="2.5"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4"/></svg>',
  refresh: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15.6-6.1L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15.6 6.1L3 16"/><path d="M3 21v-5h5"/></svg>',
  pause:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9 9.5v5M15 9.5v5"/></svg>',
  arrowL:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M14 6l-6 6 6 6"/></svg>',
  arrowR:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M10 6l6 6-6 6"/></svg>',
};

// ——— State ———
const state = {
  projects: [],
  brand: [],
  groupBuy: [],
  prefs: loadPrefs(),
  masterMonth: null,
  masterFilter: null,
};

function loadPrefs() {
  try { return Object.assign({ groupBy:'kind', sort:'updated', statuses:['active','waiting','hold'] }, JSON.parse(localStorage.getItem(PREFS_KEY) || '{}')); }
  catch { return { groupBy:'kind', sort:'updated', statuses:['active','waiting','hold'] }; }
}
function savePrefs() { localStorage.setItem(PREFS_KEY, JSON.stringify(state.prefs)); }

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

// ——— Fetch with sessionStorage cache ———
async function fetchPublic(path, useCache = true) {
  if (useCache) {
    try {
      const cache = JSON.parse(sessionStorage.getItem(MD_CACHE_KEY) || '{}');
      if (cache[path]) return cache[path];
    } catch {}
  }
  const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}?ref=${BRANCH}`, {
    headers: { 'Accept': 'application/vnd.github.v3+json' }
  });
  if (res.status === 403) {
    const reset = res.headers.get('x-ratelimit-reset');
    const wait = reset ? Math.ceil((parseInt(reset) * 1000 - Date.now()) / 60000) : '?';
    throw new Error(`API 流量限制，請約 ${wait} 分鐘後重試`);
  }
  if (!res.ok) throw new Error(`GitHub API 錯誤 (${res.status})`);
  const data = await res.json();
  if (useCache) {
    try {
      const cache = JSON.parse(sessionStorage.getItem(MD_CACHE_KEY) || '{}');
      cache[path] = data;
      sessionStorage.setItem(MD_CACHE_KEY, JSON.stringify(cache));
    } catch {}
  }
  return data;
}

function decodeMd(data) {
  return decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
}

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ——— Date utilities ———
function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
function fmtMD(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
const WEEKDAYS = ['日','一','二','三','四','五','六'];

// ——— Date extraction ———
// Returns: [{ date, endDate?, type, source, text, time?, raw }]
// types: start | todo | done | log | note | campaign
function extractDates(md, projectName) {
  const events = [];
  const seen = new Set();
  const lines = md.split('\n');
  let section = '';
  const today = startOfDay(new Date());
  const thisYear = today.getFullYear();

  function pushEvent(dateStr, type, source, text, opts={}) {
    const k = `${dateStr}|${type}|${text.slice(0, 30)}`;
    if (seen.has(k)) return;
    seen.add(k);
    events.push({ date: new Date(dateStr), type, source, text, raw: opts.raw, time: opts.time, endDate: opts.endDate });
  }

  function tryISO(s, type, source, sourceText, opts={}) {
    const r = /\b(\d{4})-(\d{1,2})-(\d{1,2})\b/g;
    let m;
    while ((m = r.exec(s))) {
      const y = +m[1], mo = +m[2], d = +m[3];
      if (y < 2020 || y > 2035 || mo < 1 || mo > 12 || d < 1 || d > 31) continue;
      const iso = `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      // detect time range after the date
      let time = null;
      const tail = s.slice(m.index + m[0].length, m.index + m[0].length + 30);
      const tm = tail.match(/(\d{1,2}):(\d{2})\s*[~–\-至]?\s*(\d{1,2}:\d{2})?/);
      if (tm) time = tm[0].trim();
      pushEvent(iso, type, source, sourceText, { raw: m[0], time, ...opts });
    }
  }

  function tryRange(s, source, sourceText) {
    // 2026-05 中 ~ 2026-07 中  /  2026-05 ~ 2026-07
    const r = /(\d{4})-(\d{1,2})\s*(?:月)?\s*(?:中|初|底)?\s*[~～\-–至]\s*(\d{4})-(\d{1,2})/g;
    let m;
    while ((m = r.exec(s))) {
      const y1=+m[1], mo1=+m[2], y2=+m[3], mo2=+m[4];
      if (y1 < 2020 || y2 > 2035) continue;
      const start = `${y1}-${String(mo1).padStart(2,'0')}-15`;
      const end   = `${y2}-${String(mo2).padStart(2,'0')}-15`;
      pushEvent(start, 'campaign', source, sourceText, { raw: m[0], endDate: new Date(end) });
    }
  }

  function tryCN(s, type, source, sourceText) {
    const r = /(\d{4})\s*年\s*(\d{1,2})\s*月\s*(\d{1,2})\s*日?/g;
    let m;
    while ((m = r.exec(s))) {
      const y=+m[1], mo=+m[2], d=+m[3];
      if (y < 2020 || y > 2035) continue;
      const iso = `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      pushEvent(iso, type, source, sourceText, { raw: m[0] });
    }
  }

  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (!line) continue;
    if (line.startsWith('## ')) { section = line.replace(/^##+\s*/, ''); continue; }
    if (line.startsWith('### ')) { continue; }

    const isMeta = line.startsWith('> ');
    if (isMeta) {
      // Only specific meta keys yield dates
      if (line.startsWith('> 開始日期：')) {
        tryISO(line, 'start', '開始日期', '開始：' + line.replace('> 開始日期：','').trim());
      }
      // Skip other > lines (avoid 報價/已開發票/分潤誤判)
      continue;
    }

    let type = 'note';
    if (section.includes('待辦')) {
      const checked = /^- \[x\]/i.test(line);
      type = checked ? 'done' : 'todo';
    } else if (section.includes('進度')) {
      type = 'log';
    } else if (section.includes('最新') || section.includes('備註') || section === '') {
      type = 'note';
    }

    // The displayed source text for the event: strip checkbox markers
    const display = line.replace(/^- \[[ x]\]\s*/i, '').replace(/^- /, '');

    tryISO(line, type, section || '備註', display);
    tryCN(line, type, section || '備註', display);
    tryRange(line, section || '備註', display);
  }

  // Filter: drop way-out-of-range dates (extra safety)
  return events.filter(e => {
    const y = e.date.getFullYear();
    return y >= 2020 && y <= 2035 && !isNaN(e.date.getTime());
  }).sort((a,b) => a.date - b.date);
}

// ——— Markdown parsing ———
function parseProject(md) {
  const lines = md.split('\n');
  const name = (lines.find(l => l.startsWith('# ')) || '# 未命名').replace('# ', '').trim();
  const meta = (key) => {
    const l = lines.find(l => l.startsWith(`> ${key}：`));
    return l ? l.replace(`> ${key}：`, '').trim() : '';
  };
  const status = meta('狀態');
  const contact = meta('窗口');
  const client = meta('客戶');
  const quoteRaw = meta('報價');
  const invoicedRaw = meta('已開發票');
  const splitRaw = meta('分潤');
  const startDateRaw = meta('開始日期');

  const parseAmount = s => { const m = s.replace(/,/g,'').match(/(\d+)/); return m ? parseInt(m[1]) : 0; };
  const quoteAmount = parseAmount(quoteRaw);
  const invoicedAmount = parseAmount(invoicedRaw);
  const splits = splitRaw ? splitRaw.split('、').map(s => s.trim()).filter(Boolean) : [];

  // Todos & last log
  let inTodo = false, inLog = false;
  const todos = [], logs = [];
  for (const line of lines) {
    if (line.startsWith('## 待辦')) { inTodo = true; inLog = false; continue; }
    if (line.startsWith('## 進度')) { inTodo = false; inLog = true; continue; }
    if (line.startsWith('## ')) { inTodo = false; inLog = false; continue; }
    if (inTodo) {
      const m = line.match(/^- \[([ x])\] (.+)/i);
      if (m) todos.push({ checked: m[1].toLowerCase() === 'x', text: m[2] });
    }
    if (inLog) {
      const m = line.match(/^- (.+)/);
      if (m) logs.push(m[1]);
    }
  }
  const openTodos = todos.filter(t => !t.checked).slice(0, 2);
  const lastLog = logs.length > 0 ? logs[logs.length - 1] : '';
  const events = extractDates(md, name);
  // Last meaningful update = max log date or start date
  let lastUpdate = null;
  for (const e of events) { if (e.type === 'log' || e.type === 'done') lastUpdate = e.date; }

  return {
    kind: 'project',
    chip: 'PROJECT',
    chipClass: '',
    name, status, contact, client,
    quoteRaw, quoteAmount, invoicedAmount, splits,
    startDateRaw,
    openTodos, allTodos: todos, lastLog,
    events,
    lastUpdate,
  };
}

function parseBrandCollab(md, type) {
  const sections = md.split(/^## /m).slice(1);
  return sections.map(sec => {
    const lines = sec.split('\n');
    const name = lines[0].trim();
    const body = lines.slice(1).join('\n');
    const meta = (key) => {
      const l = lines.find(l => l.startsWith(`> ${key}：`));
      return l ? l.replace(`> ${key}：`, '').trim() : '';
    };
    const status = meta('狀態');
    const contact = meta('窗口');
    const fee = meta('費用');
    const bullets = lines.filter(l => l.match(/^- /)).map(l => l.replace(/^- /, ''));
    const events = extractDates('## ' + sec, name);
    return {
      kind: 'brand',
      brandType: type, // '業配' | 'Reels'
      chip: type === '業配' ? 'BRAND · 業配' : 'BRAND · REELS',
      chipClass: type === '業配' ? 'is-brand-promo' : 'is-brand-reels',
      name, status, contact, fee,
      bullets,
      openTodos: bullets.slice(0, 2).map(b => ({ checked: false, text: b })),
      lastLog: bullets.length > 0 ? bullets[bullets.length - 1] : '',
      events,
      lastUpdate: events.length ? events[events.length - 1].date : null,
    };
  }).filter(item => item.name);
}

function parseGroupBuy(md) {
  const sections = md.split(/^## /m).slice(1);
  const items = [];
  for (const sec of sections) {
    const lines = sec.split('\n');
    const sectionName = lines[0].trim(); // 進行中 / 已結束
    if (!sectionName.includes('進行中')) continue;
    for (const l of lines) {
      const m = l.match(/^- (.+)/);
      if (m) {
        const text = m[1];
        // Try parse "品牌：狀態"
        const colon = text.match(/^([^：:]+)[：:](.+)$/);
        const itemName = colon ? colon[1].trim() : text;
        const itemDesc = colon ? colon[2].trim() : '';
        items.push({
          kind: 'brand',
          brandType: '團購',
          chip: 'BRAND · 團購',
          chipClass: 'is-brand-group',
          name: itemName,
          status: '進行中',
          contact: '',
          fee: '',
          bullets: itemDesc ? [itemDesc] : [],
          openTodos: itemDesc ? [{ checked: false, text: itemDesc }] : [],
          lastLog: itemDesc,
          events: extractDates('## ' + sec, itemName).filter(e => e.text.includes(itemName) || e.text.includes(itemDesc.slice(0,8))),
          lastUpdate: null,
        });
      }
    }
  }
  return items;
}

// ——— Card rendering ———
function statusBucket(status) {
  if (!status) return 'active';
  if (status.includes('完成') || status.includes('結束')) return 'done';
  if (status.includes('考慮')) return 'hold';
  if (status.includes('等待')) return 'waiting';
  return 'active';
}

function renderCard(item, idx) {
  const bucket = statusBucket(item.status);
  const cardClasses = ['card'];
  if (bucket === 'waiting') cardClasses.push('is-waiting');
  if (bucket === 'done') cardClasses.push('is-done');

  // Top-right meta：窗口 ｜ 狀態（文字 + 分隔符，不用 pill）
  const statusLabel = item.status || '進行中';
  const metaParts = [];
  if (item.contact) metaParts.push(`<span class="mt-contact">${escapeHtml(item.contact)}</span>`);
  metaParts.push(`<span class="mt-status mt-${bucket}">${escapeHtml(statusLabel)}</span>`);
  const metaTrHtml = `<div class="card-meta-tr">${metaParts.join('<span class="mt-sep">｜</span>')}</div>`;

  // Head：title + top-right meta
  const headHtml = `<div class="card-head">
    <h3 class="card-title">${escapeHtml(item.name)}</h3>
    ${metaTrHtml}
  </div>`;

  // Body：open todos / last log / empty；不用 bullet marker
  let bodyHtml = '';
  if (item.openTodos && item.openTodos.length > 0) {
    bodyHtml = item.openTodos.map(t => `
      <div class="card-todo ${t.checked?'done':''}">${formatDates(escapeHtml(t.text))}</div>
    `).join('');
  } else if (item.lastLog) {
    bodyHtml = `<div class="card-last-log"><span class="label">最後</span>${formatDates(escapeHtml(item.lastLog))}</div>`;
  } else {
    bodyHtml = `<div class="card-body-empty">（尚無待辦或紀錄）</div>`;
  }

  // Footer warm block：報價 + 已開 + 分潤（一行整合）
  const fmt = n => n.toLocaleString('zh-TW');
  let footerInner = '';
  if (item.kind === 'project') {
    const q = item.quoteRaw;
    if (q && q !== '未報價' && q !== '未成案' && item.quoteAmount > 0) {
      footerInner += `<div class="card-money">
        <span class="card-price">${fmt(item.quoteAmount)}<span class="unit">未稅</span></span>
        ${item.invoicedAmount > 0 ? `<span class="card-invoiced">已開 ${fmt(item.invoicedAmount)}</span>` : ''}
      </div>`;
      if (item.splits.length > 0) {
        footerInner += `<div class="card-splits-line">${item.splits.map(s=>escapeHtml(s)).join(' · ')}</div>`;
      }
    } else if (q) {
      footerInner += `<div class="card-money"><span class="card-price na">${escapeHtml(q)}</span></div>`;
    }
  } else if (item.kind === 'brand') {
    if (item.fee) {
      footerInner += `<div class="card-money"><span class="fee-line">${escapeHtml(item.fee)}</span></div>`;
    }
  }
  const footerHtml = footerInner ? `<div class="card-footer-warm">${footerInner}</div>` : '';

  // Bottom meta：YYYY-MM-DD 開始 · 更新於 X/Y + 月曆 icon（hover 才顯示）
  const metaPieces = [];
  if (item.startDateRaw) metaPieces.push(`${item.startDateRaw} 開始`);
  if (item.lastUpdate) metaPieces.push(`更新於 ${item.lastUpdate.getMonth()+1}/${item.lastUpdate.getDate()}`);
  const metaTextBottom = metaPieces.length ? metaPieces.join(' · ') : '';
  const calBtn = item.events.length > 0
    ? `<button class="card-cal-btn" title="${item.events.length} 個日期" onclick="openCardCal(event, ${idx})">${I.calendar}</button>`
    : '';

  const metaBottom = (metaTextBottom || calBtn)
    ? `<div class="card-meta-bottom"><span class="meta-date">${metaTextBottom}</span>${calBtn}</div>`
    : '';

  return `<div class="${cardClasses.join(' ')}" id="card-${idx}" data-bucket="${bucket}" data-kind="${item.kind}-${item.brandType||''}">
    ${headHtml}
    <div class="card-body">${bodyHtml}</div>
    ${footerHtml}
    ${metaBottom}
  </div>`;
}

// ——— Format dates inline ———
function formatDates(text) {
  const today = startOfDay(new Date());
  let result = text.replace(/(\d{4})-(\d{1,2})-(\d{1,2})/g, (match, y, m, d) => {
    const target = startOfDay(new Date(+y, +m - 1, +d));
    const diff = Math.round((target - today) / 86400000);
    const wd = WEEKDAYS[target.getDay()];
    const short = `${+m}/${+d}`;
    let label, cls;
    if (diff === 0) { label = `${short}(${wd}) 今天`; cls = 'today'; }
    else if (diff === 1) { label = `${short}(${wd}) 明天`; cls = 'tomorrow'; }
    else if (diff === -1) { label = `${short}(${wd}) 昨天`; cls = 'past'; }
    else if (diff < 0) { label = `${short}(${wd})`; cls = 'past'; }
    else if (diff < 7) { label = `${short} 本週${wd}`; cls = ''; }
    else if (diff < 14) { label = `${short} 下週${wd}`; cls = ''; }
    else { label = `${short}(${wd})`; cls = ''; }
    return `<span class="date-tag ${cls}">${label}</span>`;
  });
  result = result.replace(/（([^）]+)）/g, '<span class="annotation">（$1）</span>');
  return result;
}

// ——— Filter / sort / group ———
function getFilteredItems() {
  const all = [...state.projects, ...state.brand, ...state.groupBuy];
  const allowedBuckets = state.prefs.statuses;
  return all.filter(it => allowedBuckets.includes(statusBucket(it.status)));
}

function sortItems(items) {
  const s = state.prefs.sort;
  const arr = [...items];
  if (s === 'updated') {
    arr.sort((a,b) => (b.lastUpdate?.getTime()||0) - (a.lastUpdate?.getTime()||0));
  } else if (s === 'amount') {
    arr.sort((a,b) => (b.quoteAmount||0) - (a.quoteAmount||0));
  } else if (s === 'start') {
    arr.sort((a,b) => {
      const da = a.startDateRaw ? new Date(a.startDateRaw).getTime() : 0;
      const db = b.startDateRaw ? new Date(b.startDateRaw).getTime() : 0;
      return db - da;
    });
  } else if (s === 'name') {
    arr.sort((a,b) => a.name.localeCompare(b.name, 'zh-Hant'));
  }
  return arr;
}

function groupItems(items) {
  const g = state.prefs.groupBy;
  if (g === 'none') return [{ key: '全部', items }];
  if (g === 'status') {
    const order = [['active','進行中'],['waiting','等待中'],['hold','考慮中'],['done','已完成']];
    return order.map(([key,label]) => ({ key: label, items: items.filter(it => statusBucket(it.status) === key) }))
      .filter(g => g.items.length > 0);
  }
  if (g === 'kind') {
    const order = [
      ['project','工作室專案', it => it.kind === 'project'],
      ['promo','業配', it => it.brandType === '業配'],
      ['reels','Reels', it => it.brandType === 'Reels'],
      ['group','團購 & 公關品', it => it.brandType === '團購'],
    ];
    return order.map(([k, label, fn]) => ({ key: label, items: items.filter(fn) }))
      .filter(g => g.items.length > 0);
  }
  return [{ key: '全部', items }];
}

// ——— Render dashboard body ———
function renderBody() {
  const filtered = getFilteredItems();
  const sorted = sortItems(filtered);
  const groups = groupItems(sorted);
  const container = document.getElementById('cardsArea');
  if (!container) return;

  if (groups.length === 0) {
    container.innerHTML = `<div class="card-body-empty" style="padding:48px;text-align:center;">（沒有符合條件的項目）</div>`;
    return;
  }

  let html = '';
  let idx = 0;
  for (const g of groups) {
    html += `<div class="group-section">
      <div class="group-header"><h2>${escapeHtml(g.key)}</h2><span class="count">${g.items.length}</span></div>
      <div class="cards-grid">${g.items.map(it => renderCard(it, idx++)).join('')}</div>
    </div>`;
  }
  container.innerHTML = html;

  // Update chip counts
  const counts = { active:0, waiting:0, done:0, hold:0 };
  for (const it of [...state.projects, ...state.brand, ...state.groupBuy]) {
    counts[statusBucket(it.status)]++;
  }
  for (const k of Object.keys(counts)) {
    const el = document.querySelector(`.chip-toggle[data-status="${k}"] .count`);
    if (el) el.textContent = counts[k];
  }
}

// ——— Toolbar wiring ———
function renderToolbar() {
  const p = state.prefs;
  const groupOpts = [['status','依狀態'],['kind','依類型'],['none','不分組']];
  const sortOpts = [['updated','最近更新'],['start','開始日期'],['amount','金額大→小'],['name','名稱排序']];
  const statusList = [['active','進行中'],['waiting','等待'],['hold','考慮'],['done','完成']];
  return `<div class="toolbar">
    <div class="toolbar-inner">
      <div class="seg" role="tablist" aria-label="分組">
        ${groupOpts.map(([k,l]) => `<button class="${p.groupBy===k?'on':''}" onclick="setPref('groupBy','${k}')">${l}</button>`).join('')}
      </div>
      <div class="toolbar-spacer"></div>
      <select class="sort-select" onchange="setPref('sort', this.value)">
        ${sortOpts.map(([k,l]) => `<option value="${k}" ${p.sort===k?'selected':''}>${l}</option>`).join('')}
      </select>
      <button class="icon-btn" onclick="openMasterCal()" title="總表月曆">${I.calendar}</button>
      <button class="icon-btn ghost" onclick="hardRefresh()" title="重新整理">${I.refresh}</button>
      <div class="chips-row">
        ${statusList.map(([k,l]) => `<button class="chip-toggle ${p.statuses.includes(k)?'on':''}" data-status="${k}" onclick="toggleStatus('${k}')"><span class="dot"></span>${l}<span class="count">0</span></button>`).join('')}
      </div>
    </div>
  </div>`;
}

window.setPref = function(key, val) {
  state.prefs[key] = val;
  savePrefs();
  if (key === 'sort' || key === 'groupBy') renderBody();
  if (key === 'groupBy' || key === 'sort') {
    document.querySelectorAll('.toolbar .seg').forEach(seg => {
      seg.querySelectorAll('button').forEach(b => b.classList.remove('on'));
    });
    document.querySelectorAll('.toolbar .seg button').forEach(b => {
      const txt = b.textContent.trim();
      if (state.prefs.groupBy === 'status' && txt === '依狀態') b.classList.add('on');
      if (state.prefs.groupBy === 'kind' && txt === '依類型') b.classList.add('on');
      if (state.prefs.groupBy === 'none' && txt === '不分組') b.classList.add('on');
    });
  }
};

window.toggleStatus = function(k) {
  const arr = state.prefs.statuses;
  const idx = arr.indexOf(k);
  if (idx >= 0) arr.splice(idx, 1); else arr.push(k);
  savePrefs();
  document.querySelector(`.chip-toggle[data-status="${k}"]`).classList.toggle('on');
  renderBody();
};

window.hardRefresh = function() {
  sessionStorage.removeItem(MD_CACHE_KEY);
  loadAll();
};

// ——— Calendar (unified: card click + toolbar click 都走 openMasterCal) ———
const IMPORTANT_TYPES = new Set(['start', 'todo', 'campaign']);

function formatYM(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }

// 清掉事件文字裡的日期前綴，月曆格子只顯示語意
function stripDate(t) {
  if (!t) return '';
  return String(t)
    .replace(/\b\d{4}-\d{1,2}-\d{1,2}\b/g, '')
    .replace(/\d{4}\s*年\s*\d{1,2}\s*月\s*\d{1,2}\s*日?/g, '')
    .replace(/^\s*[、，,·\-—\s]+/, '')
    .trim();
}

function truncate(s, n) {
  s = String(s || '');
  return s.length > n ? s.slice(0, n - 1) + '…' : s;
}

function getItemByCardIdx(idx) {
  const filtered = getFilteredItems();
  const sorted = sortItems(filtered);
  const groups = groupItems(sorted);
  let cnt = 0;
  for (const g of groups) for (const it of g.items) {
    if (cnt === idx) return it;
    cnt++;
  }
  return null;
}

function getAllEvents() {
  const all = [...state.projects, ...state.brand, ...state.groupBuy];
  const out = [];
  for (const it of all) {
    if (state.masterFilter && it !== state.masterFilter) continue;
    for (const e of it.events) {
      if (!IMPORTANT_TYPES.has(e.type)) continue;
      out.push(Object.assign({}, e, { project: it }));
    }
  }
  return out;
}

function brandClass(item) {
  if (item.kind === 'project') return '';
  if (item.brandType === '業配') return 'brand-promo';
  if (item.brandType === 'Reels') return 'brand-reels';
  if (item.brandType === '團購') return 'brand-group';
  return '';
}

function pickInitialMonth() {
  return new Date();
}

window.openCardCal = function(ev, idx) {
  ev.stopPropagation();
  const item = getItemByCardIdx(idx);
  openMasterCal(item);
};

window.openMasterCal = function(projectFilter) {
  state.masterFilter = projectFilter || null;
  state.masterMonth = state.masterMonth || pickInitialMonth();
  const modal = document.getElementById('masterModal');
  modal.innerHTML = renderMasterModal(state.masterMonth);
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
};

window.closeMasterCal = function() {
  const modal = document.getElementById('masterModal');
  modal.classList.remove('open');
  modal.innerHTML = '';
  state.masterFilter = null;
  closeDaySheet();
  document.body.style.overflow = '';
};

window.masterMonth = function(delta) {
  const d = new Date(state.masterMonth);
  d.setMonth(d.getMonth() + delta);
  state.masterMonth = d;
  document.getElementById('masterModal').innerHTML = renderMasterModal(d);
};

window.masterGoToday = function() {
  state.masterMonth = new Date();
  document.getElementById('masterModal').innerHTML = renderMasterModal(state.masterMonth);
};

function renderMasterModal(monthDate) {
  const events = getAllEvents();
  const y = monthDate.getFullYear(), m = monthDate.getMonth();
  const first = new Date(y, m, 1);
  const startDow = first.getDay();
  const lastDay = new Date(y, m+1, 0).getDate();
  const today = startOfDay(new Date());
  const monthEnd = new Date(y, m+1, 0);

  // events by day (含跨月份的 range)
  const byDay = {};
  for (const e of events) {
    const sameMonth = e.date.getFullYear() === y && e.date.getMonth() === m;
    if (sameMonth) {
      const d = e.date.getDate();
      (byDay[d] = byDay[d] || []).push(e);
    }
    if (e.endDate) {
      const overlaps = e.date <= monthEnd && e.endDate >= first;
      if (overlaps) {
        const sStart = (e.date < first) ? 1 : e.date.getDate();
        const eEnd = (e.endDate > monthEnd) ? lastDay : e.endDate.getDate();
        for (let d = sStart; d <= eEnd; d++) {
          const arr = byDay[d] = byDay[d] || [];
          if (!arr.includes(e)) arr.push(e);
        }
      }
    }
  }

  // Build grid：7 欄 weekday header + 6 週格子撐滿視窗
  let gridCells = '';
  for (const wd of WEEKDAYS) gridCells += `<div class="wd">${wd}</div>`;
  // 前導空格
  for (let i = 0; i < startDow; i++) {
    const fillDow = i;
    const isWeekend = fillDow === 0 || fillDow === 6;
    gridCells += `<div class="mc-cell other ${isWeekend?'weekend':''}"></div>`;
  }
  for (let d = 1; d <= lastDay; d++) {
    const dt = new Date(y, m, d);
    const dow = dt.getDay();
    const isToday = dt.getTime() === today.getTime();
    const isWeekend = dow === 0 || dow === 6;
    const evs = byDay[d] || [];
    const visible = evs.slice(0, 4);
    const more = evs.length - visible.length;
    const classes = ['mc-cell'];
    if (isToday) classes.push('today');
    if (isWeekend) classes.push('weekend');
    gridCells += `<div class="${classes.join(' ')}" onclick="openDaySheet(${y},${m},${d})">
      <div class="day-num">${d}</div>
      ${visible.map(e => {
        const cls = brandClass(e.project);
        const isRange = !!e.endDate;
        const fullLabel = `${e.project.name} · ${e.text}`;
        const shortText = truncate(stripDate(e.text) || e.project.name, 22);
        return `<div class="mc-event ${cls} ${isRange?'range':''}" title="${escapeHtml(fullLabel)}" onclick="event.stopPropagation(); closeMasterCal(); jumpToCard('${escapeHtml(e.project.name)}')">${escapeHtml(shortText)}</div>`;
      }).join('')}
      ${more > 0 ? `<div class="mc-more">+${more} 更多</div>` : ''}
    </div>`;
  }
  // 補滿 6 週（42 格）
  const filled = startDow + lastDay;
  const trailing = (7 - (filled % 7)) % 7;
  for (let i = 0; i < trailing; i++) {
    const dow = (startDow + lastDay + i) % 7;
    const isWeekend = dow === 0 || dow === 6;
    gridCells += `<div class="mc-cell other ${isWeekend?'weekend':''}"></div>`;
  }

  const filterLabel = state.masterFilter
    ? `<span class="filter-label">${escapeHtml(state.masterFilter.name)}</span>`
    : '<span class="filter-label">全部案件</span>';

  return `
    <div class="modal-card" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-header-left">
          <h2>${I.calendar}<span>月曆</span></h2>
          ${filterLabel}
        </div>
        <div class="modal-nav">
          <button class="modal-nav-btn" onclick="masterMonth(-1)" title="上個月">${I.arrowL}</button>
          <div class="modal-nav-ym">${y} 年 ${m+1} 月</div>
          <button class="modal-nav-btn" onclick="masterMonth(1)" title="下個月">${I.arrowR}</button>
          <button class="modal-today-btn" onclick="masterGoToday()">今天</button>
          <button class="modal-close-x" onclick="closeMasterCal()" title="關閉">✕</button>
        </div>
      </div>
      <div class="modal-body">
        <div class="mc-grid">${gridCells}</div>
      </div>
      <div class="day-sheet" id="daySheet"></div>
    </div>
  `;
}

window.openDaySheet = function(y, m, d) {
  const sheet = document.getElementById('daySheet');
  if (!sheet) return;
  const target = new Date(y, m, d);
  const events = getAllEvents().filter(e => {
    const inSingle = e.date.getFullYear() === y && e.date.getMonth() === m && e.date.getDate() === d;
    const inRange = e.endDate && e.date <= target && e.endDate >= target;
    return inSingle || inRange;
  });
  const wd = WEEKDAYS[target.getDay()];
  const header = `<div class="day-sheet-head">
    <h3>${m+1}/${d}（${wd}）<span class="count">${events.length} 則</span></h3>
    <button class="modal-close-x" onclick="closeDaySheet()">✕</button>
  </div>`;
  const body = events.length === 0
    ? '<div class="card-body-empty">（這天沒事）</div>'
    : `<div class="day-sheet-list">${events.map(e => {
        const cls = brandClass(e.project);
        return `<div class="ds-row ${cls}" onclick="closeMasterCal(); jumpToCard('${escapeHtml(e.project.name)}')">
          <span class="ds-bar"></span>
          <div class="ds-main">
            <div class="ds-what">${escapeHtml(stripDate(e.text) || e.project.name)}</div>
            <div class="ds-who">${escapeHtml(e.project.name)}${e.time ? ' · ' + escapeHtml(e.time) : ''}</div>
          </div>
        </div>`;
      }).join('')}</div>`;
  sheet.innerHTML = header + body;
  sheet.classList.add('open');
};

window.closeDaySheet = function() {
  const sheet = document.getElementById('daySheet');
  if (sheet) sheet.classList.remove('open');
};

window.jumpToCard = function(projectName) {
  // Find card by data; need to compare by item name → re-search rendered cards
  const cards = document.querySelectorAll('.card');
  for (const c of cards) {
    const titleEl = c.querySelector('.card-title');
    if (titleEl && titleEl.textContent.trim().startsWith(projectName)) {
      c.scrollIntoView({ behavior: 'smooth', block: 'center' });
      c.classList.remove('flash');
      void c.offsetWidth;
      c.classList.add('flash');
      setTimeout(() => c.classList.remove('flash'), 1800);
      return;
    }
  }
};

// ——— Loaders ———
async function loadProjects() {
  try {
    const files = await fetchPublic('Projects');
    if (!Array.isArray(files)) return [];
    const mdFiles = files.filter(f => f.name.endsWith('.md'));
    const items = await Promise.all(mdFiles.map(async f => {
      const data = await fetchPublic(`Projects/${encodeURIComponent(f.name)}`);
      return parseProject(decodeMd(data));
    }));
    return items;
  } catch (e) {
    showToast(e.message, true);
    return [];
  }
}

async function loadBrand() {
  const brandFiles = [
    { path: 'Brand/%E5%BC%B7%E5%BC%B7%E6%BB%BE%E4%B8%80%E5%AE%B6-%E6%A5%AD%E9%85%8D.md', type: '業配' },
    { path: 'Brand/%E5%BC%B7%E5%BC%B7%E6%BB%BE%E4%B8%80%E5%AE%B6-Reels.md', type: 'Reels' },
  ];
  const out = [];
  for (const f of brandFiles) {
    try {
      const data = await fetchPublic(f.path);
      out.push(...parseBrandCollab(decodeMd(data), f.type));
    } catch {}
  }
  return out;
}

async function loadGroupBuy() {
  try {
    const data = await fetchPublic('Brand/%E5%BC%B7%E5%BC%B7%E6%BB%BE%E4%B8%80%E5%AE%B6-%E5%9C%98%E8%B3%BC.md');
    return parseGroupBuy(decodeMd(data));
  } catch { return []; }
}

async function loadAll() {
  const cards = document.getElementById('cardsArea');
  if (cards) cards.innerHTML = `<div class="card-body-empty" style="padding:48px;text-align:center;">載入中…</div>`;
  const [projects, brand, groupBuy] = await Promise.all([loadProjects(), loadBrand(), loadGroupBuy()]);
  state.projects = projects;
  state.brand = brand;
  state.groupBuy = groupBuy;
  renderBody();
  updateLoadTime();
}

function updateLoadTime() {
  const now = new Date();
  const ts = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const el = document.getElementById('loadTime');
  if (el) el.textContent = `讀取時間：${ts}`;
}

function renderShell() {
  document.getElementById('app').innerHTML = `
    <div class="hero">
      <div class="hero-inner">
        <h1 class="hero-title">阿忠戰情表</h1>
        <div class="hero-time" id="loadTime"></div>
      </div>
    </div>
    ${renderToolbar()}
    <div class="main">
      <div id="cardsArea"></div>
    </div>
  `;
}

window.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const modal = document.getElementById('masterModal');
    if (modal && modal.classList.contains('open')) {
      const sheet = document.getElementById('daySheet');
      if (sheet && sheet.classList.contains('open')) closeDaySheet();
      else closeMasterCal();
    }
  }
});

renderShell();
loadAll();
</script>
